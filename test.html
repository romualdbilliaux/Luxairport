<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DIAGNOSTIC LUX</title>
<style>
body{font-family:monospace;padding:16px;background:#1c1c1e;color:#fff;font-size:14px;}
.ok{background:#1a3a1a;border:1px solid #34c759;color:#34c759;padding:10px;margin:6px 0;border-radius:8px;}
.err{background:#3a1a1a;border:1px solid #ff3b30;color:#ff3b30;padding:10px;margin:6px 0;border-radius:8px;}
.info{background:#1a2a3a;border:1px solid #007aff;color:#007aff;padding:10px;margin:6px 0;border-radius:8px;}
h2{color:#fff;margin-bottom:16px;}
</style>
</head>
<body>
<h2>🔍 Diagnostic LUX AIRPORT</h2>
<div id="log"></div>

<script>
var log = document.getElementById('log');
function add(msg, type) {
  var d = document.createElement('div');
  d.className = type || 'info';
  d.textContent = msg;
  log.appendChild(d);
}

// Info device
add('📱 User Agent: ' + navigator.userAgent.substring(0, 80));
add('🌐 Online: ' + navigator.onLine);
add('🔒 Protocol: ' + location.protocol);
add('📍 URL: ' + location.href);

// Charger React et tester
var step = 0;
function loadScript(url, name, onOk, onFail) {
  var s = document.createElement('script');
  s.src = url;
  s.crossOrigin = 'anonymous';
  s.onload = function() { add('✅ Chargé: ' + name, 'ok'); if(onOk) onOk(); };
  s.onerror = function(e) { add('❌ ÉCHEC: ' + name + ' — ' + url, 'err'); if(onFail) onFail(); };
  document.head.appendChild(s);
}

// Charger en séquence pour voir lequel plante
loadScript(
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'React 18',
  function() {
    loadScript(
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'ReactDOM 18',
      function() {
        add('⚡ Test React render...', 'info');
        try {
          var div = document.createElement('div');
          ReactDOM.createRoot(div).render(React.createElement('span', null, 'OK'));
          add('✅ React.createElement + createRoot = OK', 'ok');
        } catch(e) {
          add('❌ React render FAIL: ' + e.message, 'err');
        }
        loadScript(
          'https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js',
          'Firebase App 9.6.7',
          function() {
            loadScript(
              'https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js',
              'Firebase Firestore 9.6.7',
              function() {
                add('⚡ Test Firebase init...', 'info');
                try {
                  firebase.initializeApp({
                    apiKey:"AIzaSyDbG6gPczlMloUp3PCm2lcOwPlYLCrE8dg",
                    authDomain:"luxairport-airside.firebaseapp.com",
                    projectId:"luxairport-airside",
                    appId:"1:1073777108600:web:d8df6073e9a04665646f8d"
                  });
                  add('✅ Firebase init OK', 'ok');
                  firebase.firestore().collection('params').doc('config').get()
                    .then(function(d) { add('✅ Firebase READ OK — doc exists: ' + d.exists, 'ok'); })
                    .catch(function(e) { add('❌ Firebase READ FAIL: ' + e.message, 'err'); });
                } catch(e) {
                  add('❌ Firebase init FAIL: ' + e.message, 'err');
                }
                loadScript(
                  'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
                  'jsPDF 2.5.1',
                  function() {
                    loadScript(
                      'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js',
                      'QRious 4.0.2',
                      function() {
                        add('🎉 TOUS LES CDNs CHARGÉS — Le problème est ailleurs dans le JS', 'ok');
                      }
                    );
                  }
                );
              }
            );
          }
        );
      }
    );
  }
);
</script>
</body>
</html>
