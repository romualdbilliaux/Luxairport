function SigCanvas({onReady}){
  const ref=useRef(null);const ctx=useRef(null);const on=useRef(false);const last=useRef({x:0,y:0});
  useEffect(()=>{const cv=ref.current;if(!cv)return;const c=cv.getContext("2d");c.strokeStyle=S.dark;c.lineWidth=2;c.lineCap="round";ctx.current=c;if(onReady)onReady(()=>cv.toDataURL());},[]);
  const gp=(e,t)=>{const cv=ref.current;const r=cv.getBoundingClientRect();const s=t?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};};
  return h("div",{},
    h("div",{style:{border:"1.5px solid "+S.border,borderRadius:12,overflow:"hidden",marginBottom:8}},
      h("canvas",{ref,width:600,height:100,style:{display:"block",width:"100%",height:100,touchAction:"none",cursor:"crosshair",background:"#fafafa"},
        onMouseDown:e=>{on.current=true;last.current=gp(e,false);},
        onMouseMove:e=>{if(!on.current)return;const p=gp(e,false);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onMouseUp:()=>on.current=false,
        onTouchStart:e=>{e.preventDefault();on.current=true;last.current=gp(e,true);},
        onTouchMove:e=>{e.preventDefault();if(!on.current)return;const p=gp(e,true);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onTouchEnd:()=>on.current=false
      })
    ),
    h("button",{onClick:()=>{const cv=ref.current;if(cv)cv.getContext("2d").clearRect(0,0,cv.width,cv.height);},style:{background:S.bg,border:"none",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:14}},"Effacer")
  );
}

function CamScanner({onDetect}){
  const vr=useRef(null);const cr=useRef(null);const sr=useRef(null);const raf=useRef(null);const scanning=useRef(true);
  const[manual,setManual]=useState("");const[err,setErr]=useState("");const[ok,setOk]=useState("");const[active,setActive]=useState(false);
  useEffect(()=>{
    let stream=null;
    const start=async()=>{
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280}}});
        sr.current=stream;const v=vr.current;
        if(v){v.srcObject=stream;v.setAttribute("playsinline","true");v.setAttribute("muted","true");
          await v.play().catch(()=>{});setActive(true);setTimeout(()=>requestAnimationFrame(tick),500);}
      }catch(ex){setErr("Camera non disponible - saisie manuelle disponible");}
    };
    start();
    return()=>{scanning.current=false;cancelAnimationFrame(raf.current);if(stream)stream.getTracks().forEach(t=>t.stop());};
  },[]);
  const tick=()=>{
    if(!scanning.current)return;const v=vr.current;const c=cr.current;
    if(!v||!c||v.readyState<2||v.videoWidth===0){raf.current=requestAnimationFrame(tick);return;}
    try{c.width=v.videoWidth;c.height=v.videoHeight;const ctx=c.getContext("2d",{willReadFrequently:true});ctx.drawImage(v,0,0,c.width,c.height);
      const img=ctx.getImageData(0,0,c.width,c.height);const code=jsQR(img.data,img.width,img.height,{inversionAttempts:"attemptBoth"});
      if(code&&code.data){setOk(code.data);scanning.current=false;if(sr.current)sr.current.getTracks().forEach(t=>t.stop());setTimeout(()=>onDetect(code.data),500);return;}
    }catch(ex){}
    raf.current=requestAnimationFrame(tick);
  };
  return h("div",{},
    h("div",{style:{position:"relative",background:"#000",borderRadius:14,overflow:"hidden",marginBottom:12,height:220}},
      h("video",{ref:vr,style:{width:"100%",height:"100%",objectFit:"cover"},playsInline:true,muted:true,autoPlay:true}),

// PDF helper
function addFooter(doc,W,H,name,page){
  doc.setFillColor(248,248,248);doc.rect(0,H-12,W,12,"F");
  doc.setDrawColor(220,220,220);doc.line(0,H-12,W,H-12);
  doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(150,150,150);
  doc.text(name+" - Gestion Airside",10,H-5);
  doc.text("Page "+page,W/2,H-5,{align:"center"});
  doc.text(new Date().toLocaleDateString("fr-FR"),W-10,H-5,{align:"right"});
}

const genPDF=(type,data,cfg)=>{
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,H=297,name=cfg.nomSite||"LUX AIRPORT",couleur=cfg.couleur||"#c8102e",rgb=hexToRgb(couleur);
    doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,32,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");doc.text(name,32,14);
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.text(cfg.sousTitre||"Gestion Airside",32,20);
    const titles={insp:"RAPPORT INSPECTION",emp:"RAPPORT EMPRUNTS",stock:"RAPPORT STOCK",hist:"HISTORIQUE",detail:"DETAIL EMPRUNT",maint:"RAPPORT MAINTENANCE",wh:"RAPPORT ENTREPOT"};
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text(titles[type]||type.toUpperCase(),32,27);
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.text("Genere le "+now(),W-10,12,{align:"right"});
    let y=38;
    if(data.stats){
      doc.setFillColor(248,248,248);doc.rect(0,32,W,18,"F");
      const stats=data.stats;const sw=W/stats.length;
      stats.forEach((s,i)=>{const x=i*sw;const cr=hexToRgb(s.c||"#1c1c1e");doc.setFontSize(16);doc.setFont("helvetica","bold");doc.setTextColor(cr.r,cr.g,cr.b);doc.text(String(s.n),x+sw/2,43,{align:"center"});doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(140,140,140);doc.text(s.l,x+sw/2,48,{align:"center"});});
      y=56;
    }
    if(data.headers&&data.rows){
      y+=4;const cw=(W-20)/data.headers.length;
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,"F");
      doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
      data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));y+=9;
      data.rows.forEach((row,ri)=>{
        if(y>H-20){addFooter(doc,W,H,name,1);doc.addPage();y=20;}
        if(ri%2===0){doc.setFillColor(250,250,250);doc.rect(10,y,W-20,8,"F");}
        doc.setFontSize(7);doc.setFont("helvetica","normal");
        row.forEach((cell,ci)=>{const txt=String(cell||"").substring(0,Math.floor(cw/2));
          if(cell==="OK"||cell==="Bon"){doc.setTextColor(52,199,89);}else if(cell==="Moyen"){doc.setTextColor(255,149,0);}else if(cell==="NOK"||cell==="Mauvais"){doc.setTextColor(255,59,48);}else{doc.setTextColor(50,50,50);}
          doc.text(txt,12+ci*cw,y+5.5);});
        doc.setDrawColor(240,240,240);doc.line(10,y+8,W-10,y+8);y+=8;
      });
    }
    if(data.details){y+=4;
      data.details.forEach(([l,v])=>{if(y>H-20){addFooter(doc,W,H,name,1);doc.addPage();y=20;}
        doc.setFillColor(248,248,248);doc.rect(10,y,W-20,8,"F");
        doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(120,120,120);doc.text(l,12,y+5.5);
        doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);doc.text(String(v||"").substring(0,60),70,y+5.5);y+=9;});
    }
    if(y<H-40){y+=10;doc.setDrawColor(200,200,200);doc.setFillColor(255,255,255);doc.rect(10,y,80,20);doc.rect(100,y,80,20);doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text("Signature Responsable",12,y+5);doc.line(12,y+16,88,y+16);}
    addFooter(doc,W,H,name,1);doc.save(name+"_"+type+"_"+new Date().toISOString().slice(0,10)+".pdf");
  }catch(e){alert("Erreur PDF: "+e.message);}
};

    scanned.length>0&&h("div",{style:{marginTop:10}},
      h("div",{style:{fontSize:13,fontWeight:700,marginBottom:8,color:S.green}},scanned.length+" outil(s) pret(s):"),
      scanned.map((s,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#e6fff0",borderRadius:10,marginBottom:4}},
        h("div",{},h("div",{style:{fontSize:10,fontWeight:700,color:S.red}},s.id),h("div",{style:{fontSize:12,fontWeight:600}},s.nom.substring(0,35))),
        h("button",{onClick:()=>setScanned(p=>p.filter((_,j)=>j!==i)),style:{background:"#fff1f0",color:S.danger,border:"none",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:"pointer"}},"x")
      ))
    ),
    scanned.length>0&&h("div",{style:{marginTop:10}},
      FL("Personne *"),
      h("select",{value:pers,onChange:e=>setPers(e.target.value),style:SS},
        h("option",{value:""},"-- Selectionner --"),
        ...(employes||[]).map(e=>h("option",{key:e,value:e},e))
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:14}},
      h("button",{onClick:onClose,style:BS},"Annuler"),
      h("button",{onClick:()=>{if(scanned.length===0||!pers){alert("Scannez des outils et selectionnez une personne");return;}onSave({tids:scanned.map(s=>s.id),pers,etat:"Bon",comm:"Scan multiple",photo:"",sig:""});},style:{...BP,background:S.blue}},"Sortir "+scanned.length+" outil(s)")
    )
  );
}

// ── PLANNING MAINTENANCE ──────────────────────────────────────────────────
function PlanningMaintenanceModal({tools,maintenances,onClose}){
  const[yr,setYr]=useState(new Date().getFullYear());
  const months=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];
  const toolsWithMaint=tools.filter(t=>maintenances[t.id]?.prochaine);
  const toolsWithout=tools.filter(t=>!maintenances[t.id]?.prochaine);
  return h(Modal,{onClose},
    h("div",{style:{background:"linear-gradient(135deg,"+S.orange+",#e67e22)",color:"#fff",padding:"16px 16px 18px",margin:"-16px -16px 0",borderRadius:"20px 20px 0 0"}},
      h("div",{style:{fontSize:11,fontWeight:700,opacity:.8,marginBottom:4}},"PLANNING"),
      h("div",{style:{fontSize:18,fontWeight:800}},"Maintenance annuelle "+yr)
    ),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"14px 0 10px"}},
      h("button",{onClick:()=>setYr(y=>y-1),style:{background:S.bg,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer"}},String(yr-1)),
      h("span",{style:{fontWeight:700}},yr),
      h("button",{onClick:()=>setYr(y=>y+1),style:{background:S.bg,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer"}},String(yr+1))
    ),
    h("div",{style:{overflowX:"auto",marginBottom:14}},
      h("div",{style:{display:"grid",gridTemplateColumns:"110px repeat(12,1fr)",gap:2,minWidth:580}},
        h("div",{style:{fontSize:10,fontWeight:700,color:S.gray,padding:"3px"}},"Outil"),
        months.map(m=>h("div",{key:m,style:{fontSize:8,fontWeight:700,color:S.gray,textAlign:"center",padding:"3px 1px"}},m)),
        toolsWithMaint.slice(0,10).map(t=>[
          h("div",{key:"n"+t.id,style:{fontSize:9,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"3px",fontWeight:600}},t.nom.substring(0,16)),
          months.map((_,mi)=>{
            const mDate=maintenances[t.id]?.prochaine;
            const isMaint=mDate&&new Date(mDate).getMonth()===mi&&new Date(mDate).getFullYear()===yr;
            return h("div",{key:mi,style:{height:20,borderRadius:3,background:isMaint?S.orange:"#f0f0f0",border:"1px solid "+(isMaint?S.orange+"88":S.border)}});
          })
        ]).flat()
      )
    ),
    toolsWithout.length>0&&h("div",{style:{background:"#fff8e6",borderRadius:10,padding:"10px 12px",marginBottom:10,fontSize:12,color:S.orange,fontWeight:600}},
      toolsWithout.length+" outil(s) sans maintenance planifiee"
    ),
    h("button",{onClick:onClose,style:BS},"Fermer")
  );
}

// ── ENTREPOT PAGE ─────────────────────────────────────────────────────────
function EntrepotPage({isAdmin,showT,cfg,emprunts,tools,genPDF}){
  const[zones,setZones]=useState([]);
  const[articles,setArticles]=useState([]);
  const[mouvements,setMouvements]=useState([]);
  const[selZone,setSelZone]=useState(null);
  const[modal,setModal]=useState(null);
  const[view,setView]=useState("articles");

  useEffect(()=>{
    const u1=db.collection("wh_zones").onSnapshot(s=>setZones(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u2=db.collection("wh_articles").onSnapshot(s=>setArticles(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u3=db.collection("wh_mouvements").orderBy("ts","desc").onSnapshot(s=>setMouvements(s.docs.map(d=>({...d.data(),_id:d.id}))));
    return()=>{u1();u2();u3();};
  },[]);

  const saveZone=async(data)=>{if(data._id){await db.collection("wh_zones").doc(data._id).set(data,{merge:true});}else{await fbAdd("wh_zones",{...data,ts:Date.now()});}setModal(null);showT("Zone sauvegardee!");};
  const saveArticle=async(data)=>{if(data._id){await db.collection("wh_articles").doc(data._id).set(data,{merge:true});}else{await fbAdd("wh_articles",{...data,ts:Date.now()});}setModal(null);showT("Article sauvegarde!");};
  const saveMouvement=async(data)=>{await fbAdd("wh_mouvements",{...data,ts:Date.now(),date:new Date().toLocaleString("fr-FR")});
    if(data.articleId){const art=articles.find(a=>a._id===data.articleId);if(art){const ns=data.type==="entree"?(art.stock||0)+data.qte:Math.max(0,(art.stock||0)-data.qte);await db.collection("wh_articles").doc(art._id).set({stock:ns},{merge:true});}}
    setModal(null);showT("Mouvement enregistre!");
  };

  const artByZone=selZone?articles.filter(a=>a.zoneId===selZone):articles;

  return h("div",{className:"fi"},
    h("div",{style:{display:"flex",gap:8,marginBottom:12,overflowX:"auto"}},
      [["articles","Articles"],["mouvements","Mouvements"],["zones","Zones"]].map(([v,l])=>
        h("button",{key:v,onClick:()=>setView(v),style:{flex:"none",padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:600,border:"1.5px solid "+(view===v?S.red:S.border),background:view===v?S.red:S.white,color:view===v?S.white:S.dark,cursor:"pointer"}},l)
      )
    ),

    view==="zones"&&h("div",{},
      isAdmin&&h("button",{onClick:()=>setModal({t:"zone"}),style:{...BP,marginBottom:12}},"+Ajouter une zone"),
      zones.length===0?h("div",{style:{padding:28,textAlign:"center",color:S.gray}},"Aucune zone - ajoutez-en une")
      :zones.map(z=>h("div",{key:z._id,style:{background:S.white,borderRadius:14,marginBottom:8,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,.08)",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",borderLeft:"4px solid "+(z.couleur||S.blue)},
        onClick:()=>{setSelZone(z._id===selZone?null:z._id);setView("articles");}},
        h("div",{},
          h("div",{style:{fontSize:15,fontWeight:700}},(z.icon||"📦")+" "+z.nom),
          h("div",{style:{fontSize:12,color:S.gray,marginTop:3}},articles.filter(a=>a.zoneId===z._id).length+" articles")
        ),
        isAdmin&&h("button",{onClick:e=>{e.stopPropagation();setModal({t:"zone",zone:z});},style:{background:"#fff8e6",color:S.orange,border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}},"✏️")
      ))
    ),

    view==="articles"&&h("div",{},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",{style:{fontSize:14,fontWeight:700}},selZone?"Zone: "+zones.find(z=>z._id===selZone)?.nom:"Tous les articles"),
        h("div",{style:{display:"flex",gap:8}},
          selZone&&h("button",{onClick:()=>setSelZone(null),style:{...BS,width:"auto",padding:"6px 12px",fontSize:12}},"Tout voir"),
          isAdmin&&h("button",{onClick:()=>setModal({t:"article"}),style:{background:S.green,color:"#fff",border:"none",borderRadius:10,padding:"8px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}},"+")
        )
      ),
      artByZone.length===0?h("div",{style:{padding:28,textAlign:"center",color:S.gray}},"Aucun article")
      :artByZone.map(a=>h("div",{key:a._id,style:{background:S.white,borderRadius:14,marginBottom:8,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,.08)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}},
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:14,fontWeight:700}},a.nom),
            a.ref&&h("div",{style:{fontSize:11,color:S.gray,marginTop:2}},"Ref: "+a.ref),
            a.emplacement&&h("div",{style:{fontSize:11,color:S.gray}},"📍 "+a.emplacement)
          ),
          h("div",{style:{textAlign:"right",flexShrink:0}},
            h("div",{style:{fontSize:22,fontWeight:800,color:(a.stock||0)<=0?S.danger:S.green}},a.stock||0),
            h("div",{style:{fontSize:10,color:S.gray}},a.unite||"pcs")
          )
        ),
        h("div",{style:{display:"flex",gap:8,marginTop:10}},
          h("button",{onClick:()=>setModal({t:"mouvement",article:a,type:"entree"}),style:{...BG,flex:1,padding:"8px",fontSize:12}},"+Entree"),
          h("button",{onClick:()=>setModal({t:"mouvement",article:a,type:"sortie"}),style:{...BP,flex:1,padding:"8px",fontSize:12}},"-Sortie"),
          isAdmin&&h("button",{onClick:()=>setModal({t:"article",article:a}),style:{...BS,flex:1,padding:"8px",fontSize:12}},"✏️")
        )
      ))
    ),

    view==="mouvements"&&h("div",{},
      h("div",{style:{fontSize:14,fontWeight:700,marginBottom:12}},"Historique mouvements"),
      mouvements.length===0?h("div",{style:{padding:28,textAlign:"center",color:S.gray}},"Aucun mouvement")
      :mouvements.slice(0,30).map((m,i)=>h("div",{key:i,style:{background:S.white,borderRadius:12,marginBottom:6,padding:"11px 14px",boxShadow:"0 1px 2px rgba(0,0,0,.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",{},
          h("div",{style:{fontSize:13,fontWeight:600}},m.nom||m.articleId),
          h("div",{style:{fontSize:11,color:S.gray}},"👤 "+(m.personne||"-")+" - "+m.date)
        ),
        h("span",{style:{color:m.type==="entree"?S.green:S.danger,fontWeight:800,fontSize:14}},(m.type==="entree"?"+":"-")+m.qte)
      ))
    ),

    modal&&h("div",{},
      modal.t==="zone"&&h(Modal,{onClose:()=>setModal(null)},
        h("h2",{style:{fontSize:18,fontWeight:800,marginBottom:14,color:S.blue}},modal.zone?"Modifier zone":"Nouvelle zone"),
        h("input",{defaultValue:modal.zone?.nom||"",id:"zNom",placeholder:"Nom de la zone...",style:{...IS,marginBottom:10}}),
        h("div",{style:{display:"flex",gap:8,marginTop:4}},
          ["📦","🏗️","❄️","🔥","⚡","🧪","🔧","📋"].map(ic=>h("button",{key:ic,style:{width:36,height:36,borderRadius:8,border:"none",fontSize:20,cursor:"pointer",background:S.bg}},ic))
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:14}},
          h("button",{onClick:()=>setModal(null),style:BS},"Annuler"),
          h("button",{onClick:()=>{const nom=document.getElementById("zNom")?.value;if(!nom)return;saveZone({...(modal.zone||{}),nom,icon:"📦"});},style:BB},"Sauvegarder")
        )
      ),
      modal.t==="article"&&h(Modal,{onClose:()=>setModal(null)},
        h("h2",{style:{fontSize:18,fontWeight:800,marginBottom:14,color:S.green}},modal.article?"Modifier":"Nouvel article"),
        h("input",{defaultValue:modal.article?.nom||"",id:"aNom",placeholder:"Nom de l'article...",style:{...IS,marginBottom:8}}),
        h("input",{defaultValue:modal.article?.ref||"",id:"aRef",placeholder:"Reference...",style:{...IS,marginBottom:8}}),
        h("input",{defaultValue:modal.article?.emplacement||"",id:"aEmp",placeholder:"Emplacement (Zone A, Rack 1...)",style:{...IS,marginBottom:8}}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          h("input",{type:"number",defaultValue:modal.article?.stock||0,id:"aSt",placeholder:"Stock",style:IS}),
          h("select",{id:"aZone",defaultValue:modal.article?.zoneId||"",style:SS},
            h("option",{value:""},"-- Zone --"),
            zones.map(z=>h("option",{key:z._id,value:z._id},z.nom))
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:14}},
          h("button",{onClick:()=>setModal(null),style:BS},"Annuler"),
          h("button",{onClick:()=>{
            const nom=document.getElementById("aNom")?.value;
            const ref=document.getElementById("aRef")?.value||"";
            const emplacement=document.getElementById("aEmp")?.value||"";
            const stock=parseInt(document.getElementById("aSt")?.value)||0;
            const zoneId=document.getElementById("aZone")?.value||"";
            if(!nom)return;
            saveArticle({...(modal.article||{}),nom,ref,emplacement,stock,zoneId});
          },style:BG},"Sauvegarder")
        )
      ),
      modal.t==="mouvement"&&h(Modal,{onClose:()=>setModal(null)},
        h("div",{style:{background:modal.type==="entree"?"linear-gradient(135deg,#34c759,#27ae60)":"linear-gradient(135deg,"+S.red+","+darken(S.red)+")",color:"#fff",padding:"16px 16px 18px",margin:"-16px -16px 0",borderRadius:"20px 20px 0 0"}},
          h("div",{style:{fontSize:11,fontWeight:700,opacity:.8,marginBottom:4}},modal.type==="entree"?"ENTREE STOCK":"SORTIE STOCK"),
          h("div",{style:{fontSize:18,fontWeight:800}},modal.article?.nom||"")
        ),
        h("div",{style:{background:S.bg,borderRadius:12,padding:"12px 16px",margin:"14px 0",display:"flex",justifyContent:"space-between"}},
          h("span",{style:{fontWeight:600}},"Stock actuel"),
          h("span",{style:{fontSize:22,fontWeight:800,color:S.blue}},modal.article?.stock||0)
        ),
        FL("Quantite *"),
        h("input",{type:"number",min:1,defaultValue:1,id:"mQte",style:{...IS,textAlign:"center",fontSize:20,fontWeight:700}}),
        FL("Personne",true),h("input",{id:"mPers",placeholder:"Votre nom...",style:IS}),
        FL("Commentaire",true),h("input",{id:"mComm",placeholder:"Motif...",style:IS}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:14}},
          h("button",{onClick:()=>setModal(null),style:BS},"Annuler"),
          h("button",{onClick:()=>{
            const qte=parseInt(document.getElementById("mQte")?.value)||1;
            const personne=document.getElementById("mPers")?.value||"";
            const commentaire=document.getElementById("mComm")?.value||"";
            saveMouvement({articleId:modal.article._id,nom:modal.article.nom,type:modal.type,qte,personne,commentaire});
          },style:modal.type==="entree"?BG:BP},modal.type==="entree"?"Confirmer entree":"Confirmer sortie")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
