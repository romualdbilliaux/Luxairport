<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEST LUX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="root"></div>
<script>
window.onerror = function(msg,src,line,col,err) {
  document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace"><b>ERREUR ligne '+line+':</b><br>'+msg+'<br><pre>'+(err?err.stack:'')+'</pre></div>';
};

// Test 1: React
const h = React.createElement;
const {useState} = React;

// Test 2: Firebase
firebase.initializeApp({
  apiKey:"AIzaSyDbG6gPczlMloUp3PCm2lcOwPlYLCrE8dg",
  authDomain:"luxairport-airside.firebaseapp.com",
  projectId:"luxairport-airside",
  appId:"1:1073777108600:web:d8df6073e9a04665646f8d"
});
const db = firebase.firestore();

function App() {
  const [status, setStatus] = useState('Chargement...');
  const [fbStatus, setFbStatus] = useState('Test Firebase...');
  
  React.useEffect(() => {
    setStatus('React OK ✅');
    // Test Firebase
    db.collection('params').doc('config').get()
      .then(doc => setFbStatus('Firebase OK ✅ ' + (doc.exists ? '(données trouvées)' : '(vide)')))
      .catch(e => setFbStatus('Firebase ERREUR ❌ ' + e.message));
  }, []);
  
  return h('div', {style:{padding:30,fontFamily:'monospace',fontSize:16}},
    h('h2', {}, 'TEST LUX AIRPORT'),
    h('p', {style:{color:'green',marginBottom:10}}, status),
    h('p', {style:{color:'blue'}}, fbStatus),
    h('p', {style:{marginTop:20,color:'gray'}}, 'Si vous voyez ce message, React et Firebase fonctionnent !')
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:red;padding:20px">ERREUR REACT: '+e.message+'</div>';
}
</script>
</body>
</html>
