function mergeDashboardWidgets(stored){
  const map=new Map((stored||[]).map(w=>[w.id,w]));
  DASHBOARD_WIDGETS_DEFAULT.forEach((d,i)=>{
    if(!map.has(d.id)) map.set(d.id,d);
    else map.set(d.id,{...d,...map.get(d.id),order:(map.get(d.id).order??d.order??i)});
  });
  return [...map.values()].sort((a,b)=>(a.order||0)-(b.order||0));
}

function darken(hex,amt=30){try{const r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);const g=Math.max(0,parseInt(hex.slice(3,5),16)-(amt-10));const b=Math.max(0,parseInt(hex.slice(5,7),16)-(amt-10));return`rgb(${r},${g},${b})`;}catch{return hex;}}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

function compressImageFile(file,maxWidth=1400,quality=0.72){
  return new Promise((resolve,reject)=>{
    try{
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          try{
            const ratio=Math.min(1,maxWidth/(img.width||maxWidth));
            const w=Math.max(1,Math.round((img.width||maxWidth)*ratio));
            const h=Math.max(1,Math.round((img.height||maxWidth)*ratio));
            const canvas=document.createElement('canvas');
            canvas.width=w;canvas.height=h;
            const ctx=canvas.getContext('2d');
            ctx.drawImage(img,0,0,w,h);
            resolve(canvas.toDataURL('image/jpeg',quality));
          }catch(err){reject(err);}
        };
        img.onerror=reject;
        img.src=ev.target.result;
      };
      reader.onerror=reject;
      reader.readAsDataURL(file);
    }catch(err){reject(err);}
  });
}
async function filesToCompressedImages(files,maxFiles=6){
  const arr=Array.from(files||[]).slice(0,maxFiles);
  const out=[];
  for(const f of arr){
    try{out.push(await compressImageFile(f));}catch(e){}
  }
  return out;
}

const createFamilyFromButton=async()=>{

    setFamilyCreating(true);
