window.addEventListener('load', function() {
  var errors = [];
  if (typeof React === 'undefined') errors.push('React non chargé');
  if (typeof ReactDOM === 'undefined') errors.push('ReactDOM non chargé');
  if (typeof firebase === 'undefined') errors.push('Firebase non chargé');
  if (errors.length > 0) {
    document.getElementById('root').innerHTML = 
      '<div style="padding:20px;font-family:monospace;color:red;background:#fff">' +
      '<h2>CDN manquant</h2><ul>' + 
      errors.map(function(e){return '<li>'+e+'</li>';}).join('') + 
      '</ul><p>Vérifiez votre connexion internet</p></div>';
  }
});
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = 
    '<div style="padding:20px;font-family:monospace;background:#fff;color:red">' +
    '<h2>ERREUR JAVASCRIPT</h2>' +
    '<p><b>Message:</b> ' + msg + '</p>' +
    '<p><b>Ligne:</b> ' + line + '</p>' +
    '<p><b>Colonne:</b> ' + col + '</p>' +
    '<p><b>Source:</b> ' + (src||'') + '</p>' +
    (err ? '<p><b>Stack:</b><pre>' + err.stack + '</pre></p>' : '') +
    '</div>';
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  document.getElementById('root').innerHTML = 
    '<div style="padding:20px;font-family:monospace;background:#fff;color:red">' +
    '<h2>ERREUR PROMISE</h2>' +
    '<p>' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</p>' +
    (e.reason && e.reason.stack ? '<pre>' + e.reason.stack + '</pre>' : '') +
    '</div>';
});

// ── PDF PROFESSIONNEL ─────────────────────────────────────────────────────────
const genPDF=(type,data,cfg)=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const name=cfg.nomSite||'LUX AIRPORT';
    const subtitle=cfg.sousTitre||'Gestion Airside';
    const couleur=cfg.couleur||'#c8102e';
    const rgb=hexToRgb(couleur);

    // ── HEADER ──
    doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,32,'F');
    // Logo zone
    doc.setFillColor(255,255,255,30);doc.roundedRect(8,6,20,20,3,3,'F');
    // Logo SVG simplifié en texte
    doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('LUX',18,14,{align:'center'});
    doc.setFontSize(6);doc.text('>',18,18,{align:'center'});
    // Nom
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(name,32,14);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255,180);
    doc.text(subtitle,32,20);
    // Titre rapport
    const titles={insp:'RAPPORT D\'INSPECTION',emp:'RAPPORT D\'EMPRUNTS',stock:'RAPPORT DE STOCK',hist:'HISTORIQUE DES MOUVEMENTS',detail:'DÉTAIL EMPRUNT'};
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(titles[type]||type.toUpperCase(),32,27);
    // Date & ref
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255);
    doc.text('Généré le '+now(),W-10,12,{align:'right'});
    doc.text('Réf : '+refNum('RPT-'+type.toUpperCase()),W-10,18,{align:'right'});

    // ── STATS BAR ──
    let y=38;
    if(data.stats){
      doc.setFillColor(248,248,248);doc.rect(0,32,W,18,'F');
      doc.setDrawColor(230,230,230);doc.line(0,50,W,50);
      const stats=data.stats;const sw=W/stats.length;
      stats.forEach((s,i)=>{
        const x=i*sw;
        const cr=hexToRgb(s.c||'#1c1c1e');
        doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(cr.r,cr.g,cr.b);
        doc.text(String(s.n),x+sw/2,43,{align:'center'});
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);
        doc.text(s.l,x+sw/2,48,{align:'center'});
        if(i<stats.length-1){doc.setDrawColor(230,230,230);doc.line(x+sw,34,x+sw,50);}
      });
      y=56;
    }

    // ── PROGRESS ──
    if(data.progress!==undefined){
      doc.setFillColor(245,245,245);doc.rect(10,y,W-20,12,'F');
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,(W-20)*data.progress/100,12,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(data.progress+'%',W/2,y+8,{align:'center'});
      doc.setTextColor(100,100,100);doc.setFont('helvetica','normal');
      doc.text(data.progressLabel||'',10,y+18);
      y+=22;
    }

    // ── TABLE ──
    if(data.headers&&data.rows){
      y+=4;
      // Header row
      const cw=(W-20)/data.headers.length;
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,'F');
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));
      y+=9;
      data.rows.forEach((row,ri)=>{
        if(y>H-20){
          // Footer before page break
          addFooter(doc,W,H,name,1);
          doc.addPage();y=20;
          doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,'F');
          doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
          data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));
          y+=9;
        }
        if(ri%2===0){doc.setFillColor(250,250,250);doc.rect(10,y,W-20,8,'F');}
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
        row.forEach((cell,ci)=>{
          const txt=String(cell||'').substring(0,Math.floor(cw/2));
          // Badge couleur
          if(cell==='✅ OK'||cell==='OK'){doc.setTextColor(52,199,89);}
          else if(cell==='⚠️ Moyen'||cell==='Moyen'){doc.setTextColor(255,149,0);}
          else if(cell==='❌ NOK'||cell==='NOK'||cell==='Mauvais'){doc.setTextColor(255,59,48);}
          else if(cell==='📤 Sorti'||cell==='En cours'){doc.setTextColor(0,122,255);}
          else if(cell==='⚠️ Faible'){doc.setTextColor(255,59,48);}
          else{doc.setTextColor(50,50,50);}
          doc.text(txt,12+ci*cw,y+5.5);
        });
        doc.setDrawColor(240,240,240);doc.line(10,y+8,W-10,y+8);
        y+=8;
      });
    }

    // ── DETAIL SECTION ──
    if(data.details){
      y+=4;
      data.details.forEach(([l,v])=>{
        if(y>H-20){addFooter(doc,W,H,name,1);doc.addPage();y=20;}
        doc.setFillColor(248,248,248);doc.rect(10,y,W-20,8,'F');
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);doc.text(l,12,y+5.5);
        doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.text(String(v||'—').substring(0,60),70,y+5.5);
        y+=9;
      });
    }

    // ── SIGNATURE ──
    if(y<H-40){
      y+=10;
      doc.setDrawColor(200,200,200);
      doc.rect(10,y,80,20);doc.rect(100,y,80,20);
      doc.setFontSize(7);doc.setTextColor(150,150,150);
      doc.text('Visa Responsable',12,y+5);doc.text('Date',102,y+5);
      doc.line(12,y+16,88,y+16);doc.line(102,y+16,178,y+16);
      doc.setFontSize(7);doc.text('Nom & Signature',12,y+19);doc.text(new Date().toLocaleDateString('fr-FR'),102,y+19);
    }

    addFooter(doc,W,H,name,1);
    doc.save('LuxAirport_'+type+'_'+new Date().toISOString().slice(0,10)+'.pdf');

function SigCanvas({onReady}){
  const ref=useRef(null);const ctx=useRef(null);const on=useRef(false);const last=useRef({x:0,y:0});
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const c=cv.getContext('2d');c.strokeStyle=S.dark;c.lineWidth=2;c.lineCap='round';ctx.current=c;
    if(onReady)onReady(()=>cv.toDataURL());
  },[]);
  const gp=(e,t)=>{const cv=ref.current;const r=cv.getBoundingClientRect();const s=t?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};};
  return h('div',{},
    h('div',{style:{border:'1.5px solid '+S.border,borderRadius:12,overflow:'hidden',marginBottom:8}},
      h('canvas',{ref,width:600,height:100,style:{display:'block',width:'100%',height:100,touchAction:'none',cursor:'crosshair',background:'#fafafa'},
        onMouseDown:e=>{on.current=true;last.current=gp(e,false);},
        onMouseMove:e=>{if(!on.current)return;const p=gp(e,false);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onMouseUp:()=>on.current=false,
        onTouchStart:e=>{e.preventDefault();on.current=true;last.current=gp(e,true);},
        onTouchMove:e=>{e.preventDefault();if(!on.current)return;const p=gp(e,true);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onTouchEnd:()=>on.current=false
      })
    ),
    h('button',{onClick:()=>{const cv=ref.current;if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);},
      style:{background:S.bg,border:'none',borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:14}},'Effacer signature')
  );
}

function CamScanner({onDetect}){
  const vr=useRef(null);const cr=useRef(null);const sr=useRef(null);const raf=useRef(null);
  const[manual,setManual]=useState('');const[err,setErr]=useState('');const[ok,setOk]=useState('');
  useEffect(()=>{
    navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment'}})
      .then(s=>{sr.current=s;if(vr.current){vr.current.srcObject=s;vr.current.play();vr.current.onloadedmetadata=tick;}})
      .catch(()=>setErr('Caméra non disponible — utilisez la saisie manuelle'));
    return()=>{cancelAnimationFrame(raf.current);sr.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  const tick=()=>{
    const v=vr.current;const c=cr.current;
    if(!v||!c||v.readyState<2){raf.current=requestAnimationFrame(tick);return;}
    const ctx=c.getContext('2d',{willReadFrequently:true});c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
    const code=window.jsQR&&window.jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height,{inversionAttempts:'dontInvert'});
    if(code){setOk(code.data);cancelAnimationFrame(raf.current);sr.current?.getTracks().forEach(t=>t.stop());setTimeout(()=>onDetect(code.data),400);return;}
    raf.current=requestAnimationFrame(tick);
  };
  return h('div',{},
    h('div',{style:{position:'relative',background:'#000',borderRadius:14,overflow:'hidden',marginBottom:12,height:200}},
      h('video',{ref:vr,style:{width:'100%',height:'100%',objectFit:'cover'},playsInline:true,muted:true}),
      h('canvas',{ref:cr,style:{display:'none'}}),
      !ok&&!err&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}},
        h('div',{style:{width:160,height:160,border:'3px solid '+S.red,borderRadius:12,boxShadow:'0 0 0 9999px rgba(0,0,0,.5)'}}),
        h('div',{style:{position:'absolute',bottom:12,color:'#fff',fontSize:11,fontWeight:600}},'Pointez vers le QR code')
      ),
      ok&&h('div',{style:{position:'absolute',inset:0,background:'rgba(52,199,89,.9)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:36}},'✅'),h('div',{style:{color:S.white,fontWeight:800,fontSize:15}},ok)
      ),
      err&&h('div',{style:{position:'absolute',inset:0,background:'#111',display:'flex',alignItems:'center',justifyContent:'center',color:S.white,fontSize:12,padding:16,textAlign:'center'}},err)
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{value:manual,onChange:e=>setManual(e.target.value.toUpperCase()),placeholder:"Ou saisissez l'ID manuellement...",
        style:{flex:1,padding:'11px 13px',border:'1.5px solid '+S.border,borderRadius:12,fontSize:14,outline:'none',textTransform:'uppercase'},
        onKeyDown:e=>e.key==='Enter'&&manual&&onDetect(manual)}),
      h('button',{onClick:()=>manual&&onDetect(manual),style:{background:S.red,color:S.white,border:'none',borderRadius:12,padding:'0 16px',fontWeight:700,cursor:'pointer',fontSize:14}},'OK')
    )
  );
}

function darken(hex){

function QRCodeDisplay({text,size=120,label}){
  const canvasRef=useRef(null);
  const sz=size;
  useEffect(()=>{
    if(!canvasRef.current||!text)return;
    try{
      new window.QRious({
        element:canvasRef.current,
        value:String(text),
        size:sz,
        background:"white",
        foreground:"black",
        level:"H"
      });
    }catch(e){
      const ctx=canvasRef.current.getContext("2d");
      if(!ctx)return;
      ctx.fillStyle="#fff";ctx.fillRect(0,0,sz,sz);
      ctx.fillStyle="#000";ctx.font=`bold ${Math.floor(sz/10)}px monospace`;
      ctx.textAlign="center";ctx.fillText(String(text).slice(0,10),sz/2,sz/2);
    }
  },[text,sz]);
  return h("div",{style:{textAlign:"center"}},
    h("div",{style:{display:"inline-block",background:"#fff",padding:6,borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.12)"}},
      h("canvas",{ref:canvasRef,width:sz,height:sz,style:{display:"block",borderRadius:6}})
    ),
    label&&h("div",{style:{fontSize:9,color:S.gray,fontWeight:700,marginTop:3,letterSpacing:.5,textTransform:"uppercase"}},label)
  );
}

function WarehouseConfigPanel({warehouseConfig,onSave}){
  const wc=warehouseConfig||{allees:2,racks:3,etages:3,positions:["G","M","D"]};

  const[newPos,setNewPos]=useState("");

  const total=allees*racks*etages*positions.length;
  const addPos=()=>{const p=newPos.trim().toUpperCase();if(p&&!positions.includes(p)){setPositions(ps=>[...ps,p]);setNewPos("");}};
  const removePos=p=>setPositions(ps=>ps.filter(x=>x!==p));

  return h("div",{},
    h("div",{style:{fontSize:14,fontWeight:800,marginBottom:12}},"Configuration de l'entrepôt"),

// ── GENERATE PALETTE PDF (A3, QR intégré) ────────────────────────────────




function generatePalettePDF(pal,cfg){
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a3"});
    const W=420,H=297;
    // Generate QR as base64
    let qrImg=null;
    try{
      const c=document.createElement("canvas");
      new window.QRious({element:c,value:pal.id+(pal.items?"|"+(pal.items||[]).map(i=>i.nom).join(","):""),size:400,background:"white",foreground:"black",level:"H"});
      qrImg=c.toDataURL("image/png");
    }catch(e){}
    // Left: QR large (scannable at 6m)
    if(qrImg){doc.addImage(qrImg,"PNG",12,12,100,100);}
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(150,150,150);
    doc.text("Scanner pour identifier",62,116,{align:"center"});
    // Center: PAL ID huge
    doc.setFontSize(86);doc.setFont("helvetica","bold");doc.setTextColor(0,0,0);
    doc.text(pal.id,W/2,72,{align:"center"});
    // Separator
    doc.setDrawColor(0,0,0);doc.setLineWidth(1.5);doc.line(120,85,W-12,85);
    // Content
    doc.setFontSize(26);doc.setFont("helvetica","bold");doc.setTextColor(0,0,0);
    doc.text("CONTENU :",125,100);
    let cy=116;doc.setFont("helvetica","normal");doc.setFontSize(20);
    (pal.items||[]).forEach((item,i)=>{
      if(cy>H-38)return;
      if(i%2===0){doc.setFillColor(248,248,250);doc.rect(122,cy-6,W-134,14,"F");}
      doc.text(`${i+1}. ${item.nom.slice(0,44)}${item.qte?" x"+item.qte:""}`,126,cy);
      cy+=15;
    });
    // Bottom black bar with info
    doc.setFillColor(28,28,30);doc.rect(0,H-22,W,22,"F");
    doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(220,220,220);
    const info=[pal.createdBy&&"Par: "+pal.createdBy,pal.provenance&&"De: "+pal.provenance,pal.destination&&"Vers: "+pal.destination,pal.createdAt&&pal.createdAt.split(" ")[0]].filter(Boolean).join("   ·   ");
    doc.text(info||pal.id,W/2,H-8,{align:"center"});
    doc.save(`${pal.id}_fiche_A3.pdf`);
  }catch(e){alert("Erreur PDF: "+e.message);}
}

    kits.forEach(k=>{if(k.nom.toLowerCase().includes(ql)){res.push({type:"kit",icon:"🧰",id:k._id,title:k.nom,sub:(k.outils?.length||0)+" outils",color:S.purple});}});

          FL("Sous-titre",true),h("input",{value:lCfg.sousTitre||"",onChange:e=>setLCfg(p=>({...p,sousTitre:e.target.value})),placeholder:"Gestion Airside",style:IS}),
          FL("Couleur principale",true),
          h("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:8}},
            h("input",{type:"color",value:lCfg.couleur||"#c8102e",onChange:e=>setLCfg(p=>({...p,couleur:e.target.value})),style:{width:50,height:40,border:"none",borderRadius:8,cursor:"pointer",padding:2}}),
            h("div",{style:{flex:1,height:40,borderRadius:8,background:lCfg.couleur||"#c8102e"}})
          ),
          FL("Logo (upload)",true),
          h("label",{style:{display:"block",border:"2px dashed "+S.border,borderRadius:12,padding:"10px",textAlign:"center",cursor:"pointer",fontSize:13,color:S.gray,marginBottom:10}},"Uploader un logo",
            h("input",{type:"file",accept:"image/*",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setLCfg(p=>({...p,logoUrl:ev.target.result}));r.readAsDataURL(f);}})
          ),
          lCfg.logoUrl&&h("img",{src:lCfg.logoUrl,style:{width:60,height:60,borderRadius:10,objectFit:"cover",marginBottom:10}}),
          FL("Photo de couverture",true),
          h("label",{style:{display:"block",border:"2px dashed "+S.border,borderRadius:12,padding:"10px",textAlign:"center",cursor:"pointer",fontSize:13,color:S.gray,marginBottom:10}},"Photo de couverture",
            h("input",{type:"file",accept:"image/*",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setLCfg(p=>({...p,coverUrl:ev.target.result}));r.readAsDataURL(f);}})
          ),
          lCfg.coverUrl&&h("img",{src:lCfg.coverUrl,style:{width:"100%",height:80,borderRadius:10,objectFit:"cover",marginBottom:10}})
        )
      ),
      h("button",{onClick:()=>{onSaveCfg({...cfg,...lCfg});showT("Apparence sauvegardee!");},style:BP},"Sauvegarder")
    )
  );
}
