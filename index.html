  }catch(e){return false;}
}

const hexToRgb=hex=>{const r=parseInt(hex.slice(1,3),16);const g=parseInt(hex.slice(3,5),16);const b=parseInt(hex.slice(5,7),16);return{r,g,b};};
function addFooter(doc,W,H,name,page){
  doc.setFillColor(248,248,248);doc.rect(0,H-12,W,12,'F');
  doc.setDrawColor(220,220,220);doc.line(0,H-12,W,H-12);
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
  doc.text(name+' — Gestion Airside · Confidentiel',10,H-5);
  doc.text('Page '+page,W/2,H-5,{align:'center'});
  doc.text(new Date().toLocaleDateString('fr-FR'),W-10,H-5,{align:'right'});
}
const genPDF=(type,data,cfg)=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const name=cfg.nomSite||'LUX AIRPORT';
    const subtitle=cfg.sousTitre||'Gestion Airside';
    const couleur=cfg.couleur||'#c8102e';
    const rgb=hexToRgb(couleur);
    doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,32,'F');
    doc.setFillColor(255,255,255,30);doc.roundedRect(8,6,20,20,3,3,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('LUX',18,14,{align:'center'});
    doc.setFontSize(6);doc.text('>',18,18,{align:'center'});
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(name,32,14);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255);
    doc.text(subtitle,32,20);
    const titles={insp:'RAPPORT D\'INSPECTION',emp:'RAPPORT D\'EMPRUNTS',stock:'RAPPORT DE STOCK',hist:'HISTORIQUE DES MOUVEMENTS',detail:'DÉTAIL EMPRUNT',wh:'RAPPORT ENTREPÔT',maint:'RAPPORT MAINTENANCE'};
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(titles[type]||type.toUpperCase(),32,27);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255);
    doc.text('Généré le '+now(),W-10,12,{align:'right'});
    doc.text('Réf : '+refNum('RPT-'+type.toUpperCase()),W-10,18,{align:'right'});
    let y=38;
    if(data.stats){
      doc.setFillColor(248,248,248);doc.rect(0,32,W,18,'F');
      doc.setDrawColor(230,230,230);doc.line(0,50,W,50);
      const stats=data.stats;const sw=W/stats.length;
      stats.forEach((s,i)=>{
        const x=i*sw;const cr=hexToRgb(s.c||'#1c1c1e');
        doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(cr.r,cr.g,cr.b);
        doc.text(String(s.n),x+sw/2,43,{align:'center'});
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);
        doc.text(s.l,x+sw/2,48,{align:'center'});
        if(i<stats.length-1){doc.setDrawColor(230,230,230);doc.line(x+sw,34,x+sw,50);}
      });y=56;
    }
    if(data.headers&&data.rows){
      y+=4;
      const cw=(W-20)/data.headers.length;
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,'F');
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));y+=9;
      data.rows.forEach((row,ri)=>{
        if(y>H-20){addFooter(doc,W,H,name,1);doc.addPage();y=20;}
        if(ri%2===0){doc.setFillColor(250,250,250);doc.rect(10,y,W-20,8,'F');}
        doc.setFontSize(7);doc.setFont('helvetica','normal');
        row.forEach((cell,ci)=>{
          const txt=String(cell||'').substring(0,Math.floor(cw/2));
          if(cell==='✅ OK'||cell==='OK'){doc.setTextColor(52,199,89);}
          else if(cell==='⚠️ Moyen'||cell==='Moyen'){doc.setTextColor(255,149,0);}

        });

function SigCanvas({onReady}){
  const ref=useRef(null);const ctx=useRef(null);const on=useRef(false);const last=useRef({x:0,y:0});
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const c=cv.getContext('2d');c.strokeStyle=S.dark;c.lineWidth=2;c.lineCap='round';ctx.current=c;
    if(onReady)onReady(()=>cv.toDataURL());
  },[]);
  const gp=(e,t)=>{const cv=ref.current;const r=cv.getBoundingClientRect();const s=t?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};};
  return h('div',{},
    h('div',{style:{border:'1.5px solid '+S.border,borderRadius:12,overflow:'hidden',marginBottom:8}},
      h('canvas',{ref,width:600,height:100,style:{display:'block',width:'100%',height:100,touchAction:'none',cursor:'crosshair',background:'#fafafa'},
        onMouseDown:e=>{on.current=true;last.current=gp(e,false);},
        onMouseMove:e=>{if(!on.current)return;const p=gp(e,false);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onMouseUp:()=>on.current=false,
        onTouchStart:e=>{e.preventDefault();on.current=true;last.current=gp(e,true);},
        onTouchMove:e=>{e.preventDefault();if(!on.current)return;const p=gp(e,true);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onTouchEnd:()=>on.current=false
      })
    ),
    h('button',{onClick:()=>{const cv=ref.current;if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);},
      style:{background:S.bg,border:'none',borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:14}},'Effacer signature')
  );
}

// ── SCANNER QR CORRIGÉ (Safari iPhone compatible) ─────────────────────────
function CamScanner({onDetect,multiMode=false}){
  // multiMode: scan plusieurs QR sans fermer la caméra
  const vr=useRef(null);const cr=useRef(null);const sr=useRef(null);const raf=useRef(null);const scanning=useRef(true);
  const[manual,setManual]=useState('');const[err,setErr]=useState('');const[ok,setOk]=useState('');const[active,setActive]=useState(false);
  useEffect(()=>{
    let stream=null;
    const start=async()=>{
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
        sr.current=stream;
        const v=vr.current;
        if(v){v.srcObject=stream;v.setAttribute('playsinline','true');v.setAttribute('muted','true');
          await v.play().catch(()=>{});
          setActive(true);
          setTimeout(()=>requestAnimationFrame(tick),500);
        }
      }catch(ex){setErr('Caméra non disponible — utilisez la saisie manuelle ci-dessous');}
    };
    start();
    return()=>{scanning.current=false;cancelAnimationFrame(raf.current);if(stream)stream.getTracks().forEach(t=>t.stop());};
  },[]);

  const tick=()=>{
    if(!scanning.current)return;
    const v=vr.current;const c=cr.current;
    if(!v||!c){raf.current=requestAnimationFrame(tick);return;}
    if(v.readyState<2||v.videoWidth===0){raf.current=requestAnimationFrame(tick);return;}
    try{
      c.width=v.videoWidth;c.height=v.videoHeight;
      const ctx=c.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(v,0,0,c.width,c.height);
      const img=ctx.getImageData(0,0,c.width,c.height);
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
      if(code&&code.data){
        setOk(code.data);scanning.current=false;
        if(sr.current)sr.current.getTracks().forEach(t=>t.stop());
        setTimeout(()=>onDetect(code.data),500);return;
      }
    }catch(ex){}
    raf.current=requestAnimationFrame(tick);
  };

  return h('div',{},
    h('div',{style:{position:'relative',background:'#000',borderRadius:14,overflow:'hidden',marginBottom:12,height:220}},
      h('video',{ref:vr,style:{width:'100%',height:'100%',objectFit:'cover'},playsInline:true,muted:true,autoPlay:true}),
      h('canvas',{ref:cr,style:{display:'none'}}),
      !ok&&!err&&active&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}},
        h('div',{style:{position:'relative',width:170,height:170}},
          h('div',{style:{position:'absolute',inset:0,border:'3px solid transparent',borderRadius:12}}),
          ['tl','tr','bl','br'].map(c=>h('div',{key:c,style:{position:'absolute',width:24,height:24,
            top:c.startsWith('t')?0:'auto',bottom:c.startsWith('b')?0:'auto',
            left:c.endsWith('l')?0:'auto',right:c.endsWith('r')?0:'auto',
            borderTop:c.startsWith('t')?'3px solid #fff':'none',
            borderBottom:c.startsWith('b')?'3px solid #fff':'none',
            borderLeft:c.endsWith('l')?'3px solid #fff':'none',
            borderRight:c.endsWith('r')?'3px solid #fff':'none',
            borderRadius:c==='tl'?'8px 0 0 0':c==='tr'?'0 8px 0 0':c==='bl'?'0 0 0 8px':'0 0 8px 0'
          }})),
          h('div',{style:{position:'absolute',bottom:-28,left:'50%',transform:'translateX(-50%)',color:'#fff',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}},'Pointez vers le QR code')
        )
      ),
      !ok&&!err&&!active&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13}},'Démarrage caméra...'),
      ok&&h('div',{style:{position:'absolute',inset:0,background:'rgba(52,199,89,.9)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:40}},'✅'),h('div',{style:{color:S.white,fontWeight:800,fontSize:14,padding:'0 20px',textAlign:'center'}},ok)
      ),
      err&&h('div',{style:{position:'absolute',inset:0,background:'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,padding:20,textAlign:'center',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:28}},'📷'),h('div',{},err)
      )
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{value:manual,onChange:e=>setManual(e.target.value.toUpperCase()),placeholder:"Ou saisissez l'ID manuellement...",
        style:{flex:1,padding:'11px 13px',border:'1.5px solid '+S.border,borderRadius:12,fontSize:14,outline:'none',textTransform:'uppercase'},
        onKeyDown:e=>e.key==='Enter'&&manual&&onDetect(manual)}),
      h('button',{onClick:()=>manual&&onDetect(manual),style:{background:S.red,color:S.white,border:'none',borderRadius:12,padding:'0 16px',fontWeight:700,cursor:'pointer',fontSize:14}},'OK')
    )
  );
}

function useKeyboardShortcuts(setPage,setModal){
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='1')setPage('accueil');
      else if(e.key==='2')setPage('emprunts');
      else if(e.key==='3')setPage('inspection');
      else if(e.key==='4')setPage('stocks');
      else if(e.key==='5')setPage('kits');
      else if(e.key==='s'&&!e.ctrlKey)setModal({t:'scan'});
      else if(e.key==='/'||e.key==='f')setModal({t:'globalSearch'});
      else if(e.key==='Escape')setModal(null);
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);
}

// ── HAPTIC FEEDBACK ──────────────────────────────────────────────────────
function haptic(type='light'){
  if(navigator.vibrate){
    if(type==='light')navigator.vibrate(10);
    else if(type==='medium')navigator.vibrate(50);
    else if(type==='heavy')navigator.vibrate([50,30,50]);
    else if(type==='success')navigator.vibrate([10,50,10]);
    else if(type==='error')navigator.vibrate([100,30,100,30,100]);
  }
}

function EntrepotPage({employes,isAdmin,showT,cfg}){
  const[zones,setZones]=useState([]);
  const[articles,setArticles]=useState([]);
  const[mouvements,setMouvements]=useState([]);
  const[view,setView]=useState('plan');
  const[selZone,setSelZone]=useState(null);
  const[modal,setModal]=useState(null);
  const[search,setSearch]=useState('');
  const[ready,setReady]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const[darkMode,setDarkMode]=useState(()=>{
    const h=new Date().getHours();
    return h>=20||h<7;
  });
  // Auto push notifications for critical alerts
  useEffect(()=>{
    if(!pushGranted)return;
    // Check for overdue tools
    const overdue=emprunts.filter(e=>!e.retour&&daysSince(e.dateDepart)>=2);
    if(overdue.length>0)sendLocalNotif('⏰ Outils en retard',overdue.length+' outil(s) sorti(s) depuis 2+ jours','⏰');
    // Check for critical stock
    const critical=[...cons,...vets].filter(i=>i.stock===0);
    if(critical.length>0)sendLocalNotif('🚨 Stock épuisé',critical.length+' article(s) épuisé(s)','🚨');
  },[emprunts,cons,vets,pushGranted]);
  useEffect(()=>{
    if(darkMode){document.body.style.background='#1c1c1e';document.body.style.color='#f2f2f7';}
    else{document.body.style.background='#f2f2f7';document.body.style.color='#1c1c1e';}
    // Auto check every hour
    const interval=setInterval(()=>{const h=new Date().getHours();setDarkMode(h>=20||h<7);},3600000);
    return()=>clearInterval(interval);
  },[darkMode]);
  useEffect(()=>{
    const handler=()=>setIsOnline(navigator.onLine);
    document.addEventListener('onlineStatus',handler);
    window.addEventListener('online',handler);
    window.addEventListener('offline',handler);
    return()=>{document.removeEventListener('onlineStatus',handler);window.removeEventListener('online',handler);window.removeEventListener('offline',handler);};
  },[]);

  useEffect(()=>{
    (async()=>{
      try{
        const[zSnap,aSnap,mSnap]=await Promise.all([
          db.collection('wh_zones').orderBy('ts','asc').get(),
          db.collection('wh_articles').orderBy('ts','asc').get(),
          db.collection('wh_mouvements').orderBy('ts','desc').get(),
        ]);
        setZones(zSnap.docs.map(d=>({...d.data(),_id:d.id})));
        setArticles(aSnap.docs.map(d=>({...d.data(),_id:d.id})));
        setMouvements(mSnap.docs.map(d=>({...d.data(),_id:d.id})));
      }catch(e){}
      setReady(true);
    })();
    const u1=db.collection('wh_zones').orderBy('ts','asc').onSnapshot(s=>setZones(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u2=db.collection('wh_articles').orderBy('ts','asc').onSnapshot(s=>setArticles(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u3=db.collection('wh_mouvements').orderBy('ts','desc').onSnapshot(s=>setMouvements(s.docs.map(d=>({...d.data(),_id:d.id}))));
    return()=>{u1();u2();u3();};
  },[]);

  const saveZone=async(data)=>{
    setSyncing(true);
    if(data._id){await fbUpd('wh_zones',data._id,{...data});showT('✅ Zone modifiée');}
    else{await fbAdd('wh_zones',{...data,ts:Date.now()});showT('✅ Zone créée !');}
    setSyncing(false);setModal(null);
  };
  const delZone=async(id)=>{
    if(!confirm('Supprimer cette zone ?'))return;
    await fbDel('wh_zones',id);showT('🗑️ Zone supprimée');
  };
  const saveArticle=async(data)=>{
    setSyncing(true);
    if(data._id){await db.collection('wh_articles').doc(data._id).set(data,{merge:true});showT('✅ Modifié');}
    else{const id='WH-'+Date.now();await db.collection('wh_articles').doc(id).set({...data,id,ts:Date.now()},);showT('✅ Article créé !');}
    setSyncing(false);setModal(null);
  };
  const saveMouvement=async(type,article,data)=>{
    setSyncing(true);
    const mv={type,articleId:article._id||article.id,articleNom:article.nom,zoneFrom:data.zoneFrom||'',zoneTo:data.zoneTo||'',qte:data.qte||1,personne:data.personne,commentaire:data.commentaire||'',photo:data.photo||'',destination:data.destination||'',provenance:data.provenance||'',date:now(),ts:Date.now()};
    await fbAdd('wh_mouvements',mv);
    // Mettre à jour stock article
    const art=articles.find(a=>(a._id||a.id)===( article._id||article.id));
    if(art){
      let newStock=art.stock||0;
      if(type==='entree')newStock+=data.qte;
      else if(type==='sortie')newStock=Math.max(0,newStock-data.qte);
      else if(type==='transfert'){newStock=art.stock;}// stock total inchangé
      await db.collection('wh_articles').doc(art._id||art.id).set({stock:newStock,zoneId:type==='transfert'?data.zoneTo:art.zoneId},{merge:true});
    }
    setSyncing(false);setModal(null);showT('✅ Mouvement enregistré !');
  };

  const filteredArticles=articles.filter(a=>{
    const q=search.toLowerCase();
    const zMatch=!selZone||a.zoneId===selZone;
    const sMatch=!search||a.nom?.toLowerCase().includes(q)||(a.id||'').toLowerCase().includes(q)||(a.ref||'').toLowerCase().includes(q);
    return zMatch&&sMatch;
  });

  const getZoneName=id=>zones.find(z=>z._id===id)?.nom||id||'—';
  const getZoneColor=id=>{const z=zones.find(x=>x._id===id);return z?.couleur||S.gray;};
  const zoneStats=zid=>({count:articles.filter(a=>a.zoneId===zid).length,stock:articles.filter(a=>a.zoneId===zid).reduce((s,a)=>s+(a.stock||0),0)});

  if(!ready)return h('div',{style:{padding:40,textAlign:'center',color:S.gray}},'Chargement entrepôt...');

  return h('div',{className:'fi'},
    // Tabs
    h('div',{style:{display:'flex',background:S.border,borderRadius:12,padding:3,marginBottom:14}},
      [['plan','🗺️ Plan'],['articles','📦 Articles'],['palettes','🏗️ Palettes'],['mouvements','📋 Historique']].map(([t,l])=>
        h('button',{key:t,onClick:()=>setView(t),style:{flex:'none',padding:'9px 12px',borderRadius:10,border:'none',background:view===t?S.white:'transparent',color:view===t?S.dark:S.gray,fontWeight:view===t?700:500,fontSize:12,cursor:'pointer',boxShadow:view===t?'0 1px 3px rgba(0,0,0,.1)':'none'}},l)
      )
    ),

    // ── VUE RACK ──
    view==='plan'&&selZone&&h('div',{style:{background:S.white,borderRadius:14,padding:'14px 16px',marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('div',{style:{fontSize:14,fontWeight:700}},'Plan — '+getZoneName(selZone)),
        h('button',{onClick:()=>setSelZone(null),style:{background:S.bg,border:'none',borderRadius:8,padding:'5px 10px',fontSize:12,cursor:'pointer'}},'← Retour')
      ),

      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}},
        Array.from({length:20},(_,i)=>{
          const pos='P'+(i+1);
          const art=articles.find(a=>a.zoneId===selZone&&(a.emplacement||'').includes(pos));
          return h('div',{key:i,style:{background:art?S.orange+'33':'#f0f0f0',borderRadius:6,padding:'8px 4px',textAlign:'center',fontSize:9,fontWeight:art?700:400,color:art?S.orange:S.gray,border:'1px solid '+(art?S.orange+'66':S.border),cursor:art?'pointer':'default',minHeight:44,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'},onClick:art?()=>setModal({t:'article',article:art}):null},
            h('div',{},pos),
            art&&h('div',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:40,fontSize:8}},art.nom.substring(0,8))
          );
        })
      ),
      h('div',{style:{display:'flex',gap:10,marginTop:8,fontSize:11}},
        h('div',{style:{display:'flex',alignItems:'center',gap:4}},h('div',{style:{width:12,height:12,background:S.orange+'33',border:'1px solid '+S.orange,borderRadius:3}}),h('span',{style:{color:S.gray}},'Occupé')),
        h('div',{style:{display:'flex',alignItems:'center',gap:4}},h('div',{style:{width:12,height:12,background:'#f0f0f0',border:'1px solid '+S.border,borderRadius:3}}),h('span',{style:{color:S.gray}},'Libre'))
      )
    ),

    // ── PLAN ──
    view==='plan'&&h('div',{},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',{style:{fontSize:16,fontWeight:800}},'🏭 Plan entrepôt'),
        isAdmin&&h('button',{onClick:()=>setModal({t:'zone'}),style:{background:S.purple,color:'#fff',border:'none',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}},'+Zone')
      ),
      zones.length===0
        ?h('div',{style:{background:S.white,borderRadius:16,padding:'40px 20px',textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},
          h('div',{style:{fontSize:48,marginBottom:12}},'🏭'),
          h('div',{style:{fontSize:16,fontWeight:700,marginBottom:8}},'Aucune zone définie'),
          h('p',{style:{fontSize:13,color:S.gray,marginBottom:16}},'Créez vos zones, racks, allées et palettes depuis le mode Admin'),
          isAdmin&&h('button',{onClick:()=>setModal({t:'zone'}),style:BP},'+ Créer la première zone')
        )
        :h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
          zones.map(z=>{
            const zs=zoneStats(z._id);
            return h('div',{key:z._id,onClick:()=>{setSelZone(z._id);setView('articles');},
              style:{background:S.white,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.1)',cursor:'pointer'}},
              h('div',{style:{background:z.couleur||S.blue,padding:'12px',textAlign:'center'}},
                h('div',{style:{fontSize:28}}),
                h('div',{style:{fontSize:16,fontWeight:800,color:'#fff',marginTop:4}},z.icon||'📦'),
                h('div',{style:{fontSize:13,fontWeight:700,color:'#fff'}},z.nom)
              ),
              h('div',{style:{padding:'10px 12px'}},
                h('div',{style:{fontSize:11,color:S.gray,fontWeight:600,textTransform:'uppercase',marginBottom:4}},z.type||'Zone'),
                h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:13}},
                  h('span',{style:{color:S.dark,fontWeight:600}},zs.count+' articles'),
                  h('span',{style:{color:S.green,fontWeight:700}},zs.stock+' pcs')
                ),
                isAdmin&&h('div',{style:{display:'flex',gap:6,marginTop:8}},
                  h('button',{onClick:e=>{e.stopPropagation();setModal({t:'zone',zone:z});},style:{flex:1,background:'#fff8e6',color:S.orange,border:'none',borderRadius:8,padding:'5px',fontSize:12,cursor:'pointer'}},'✏️'),
                  h('button',{onClick:e=>{e.stopPropagation();delZone(z._id);},style:{flex:1,background:'#fff1f0',color:S.danger,border:'none',borderRadius:8,padding:'5px',fontSize:12,cursor:'pointer'}},'🗑️')
                )
              )
            );
          })
        ),
      // Stats globales
      h('div',{style:{background:S.white,borderRadius:14,padding:'14px 16px',marginTop:14,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},
        h('div',{style:{fontSize:13,fontWeight:700,marginBottom:10}},'📊 Statistiques entrepôt'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
          [{n:zones.length,l:'Zones',c:S.purple},{n:articles.length,l:'Articles',c:S.blue},{n:articles.reduce((s,a)=>s+(a.stock||0),0),l:'Total pcs',c:S.green}].map(x=>
            h('div',{key:x.l,style:{textAlign:'center'}},
              h('div',{style:{fontSize:22,fontWeight:800,color:x.c}},x.n),
              h('div',{style:{fontSize:10,color:S.gray,fontWeight:600}},x.l)
            )
          )
        )
      )
    ),

    // ── ARTICLES ──
    view==='articles'&&h('div',{},
      h('div',{style:{display:'flex',gap:8,marginBottom:12,alignItems:'center'}},
        selZone&&h('button',{onClick:()=>setSelZone(null),style:{background:S.bg,border:'none',borderRadius:10,padding:'8px 12px',fontSize:13,cursor:'pointer'}},'← Toutes'),
        h('div',{style:{flex:1,position:'relative'}},
          h('span',{style:{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14}},'🔍'),
          h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'Rechercher...',style:{width:'100%',padding:'10px 12px 10px 34px',border:'none',borderRadius:12,fontSize:13,background:S.white,outline:'none',boxShadow:'0 1px 3px rgba(0,0,0,.08)'}})
        ),
        isAdmin&&h('button',{onClick:()=>setModal({t:'article'}),style:{background:S.green,color:'#fff',border:'none',borderRadius:10,padding:'8px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}},'+')
      ),
      selZone&&h('div',{style:{background:getZoneColor(selZone)+'22',border:`1px solid ${getZoneColor(selZone)}44`,borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:13,fontWeight:600,color:getZoneColor(selZone)}},
        '📍 Zone : '+getZoneName(selZone)
      ),
      // Filtre par zone
      h('div',{style:{display:'flex',gap:6,overflowX:'auto',marginBottom:12}},
        h('button',{onClick:()=>setSelZone(null),style:{flex:'none',padding:'6px 12px',borderRadius:20,fontSize:11,fontWeight:600,border:`1.5px solid ${!selZone?S.red:S.border}`,background:!selZone?S.red:S.white,color:!selZone?S.white:S.dark,cursor:'pointer'}},'Tout'),
        zones.map(z=>h('button',{key:z._id,onClick:()=>setSelZone(z._id),style:{flex:'none',padding:'6px 12px',borderRadius:20,fontSize:11,fontWeight:600,border:`1.5px solid ${selZone===z._id?z.couleur||S.blue:S.border}`,background:selZone===z._id?z.couleur||S.blue:S.white,color:selZone===z._id?'#fff':S.dark,cursor:'pointer'}},z.nom))
      ),
      filteredArticles.length===0
        ?h('div',{style:{padding:28,textAlign:'center',color:S.gray}},'Aucun article')
        :filteredArticles.map(a=>{
          const z=zones.find(x=>x._id===a.zoneId);
          const low=(a.stock||0)<=(a.min||0)&&(a.min||0)>0;
          return h('div',{key:a._id||a.id,style:{background:S.white,borderRadius:14,marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,.08)',borderLeft:`4px solid ${low?S.danger:z?.couleur||S.blue}`}},
            h('div',{style:{padding:'13px 16px'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}},
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontSize:10,fontWeight:700,color:S.red}},a.id||a._id),
                  h('div',{style:{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a.nom),
                  h('div',{style:{fontSize:11,color:S.gray,marginTop:2}},
                    (a.ref?a.ref+' · ':'')+(z?'📍 '+z.nom:'')
                  )
                ),
                h('div',{style:{textAlign:'right',flexShrink:0}},
                  h('div',{style:{fontSize:24,fontWeight:800,color:low?S.danger:S.green,lineHeight:1}},a.stock||0),
                  h('div',{style:{fontSize:10,color:S.gray}},a.unite||'pcs')
                )
              ),
              a.description&&h('div',{style:{fontSize:12,color:S.gray,marginTop:4,fontStyle:'italic'}},a.description),
              low&&h('div',{style:{background:'#fff1f0',borderRadius:8,padding:'5px 10px',marginTop:8,fontSize:12,color:S.danger,fontWeight:600}},'⚠️ Stock faible'),
              h('div',{style:{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}},
                h('button',{onClick:()=>setModal({t:'mouv',mtype:'sortie',article:a}),style:{...BP,flex:2,padding:'9px',fontSize:12,minWidth:60}},'📤 Sortie'),
                h('button',{onClick:()=>setModal({t:'mouv',mtype:'entree',article:a}),style:{...BG,flex:2,padding:'9px',fontSize:12,minWidth:60}},'📥 Entrée'),
                h('button',{onClick:()=>setModal({t:'mouv',mtype:'transfert',article:a}),style:{...BB,flex:2,padding:'9px',fontSize:12,minWidth:60}},'🔄 Transf.'),
                isAdmin&&h('button',{onClick:()=>setModal({t:'article',article:a}),style:{background:'#fff8e6',color:S.orange,border:'none',borderRadius:10,padding:'9px',flex:1,fontSize:13,cursor:'pointer',fontWeight:700}},'✏️')
              )
            )
          );
        })
    ),

    // ── PALETTES ──
    view==='palettes'&&h(PalettesSection,{employes,isAdmin,showT,cfg,zones}),

    // ── MOUVEMENTS ──
    view==='mouvements'&&h('div',{},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',{style:{fontSize:15,fontWeight:800}},'📋 Historique mouvements'),
        h('button',{onClick:()=>genPDF('wh',{headers:['Type','Article','Qté','Personne','Date'],rows:mouvements.slice(0,50).map(m=>[m.type,m.articleNom?.substring(0,15)||'',m.qte,m.personne,m.date])},cfg),style:{...BS,width:'auto',padding:'8px 14px',fontSize:12,color:S.red}},'📄 PDF')
      ),
      mouvements.length===0?h('div',{style:{padding:28,textAlign:'center',color:S.gray}},'Aucun mouvement')
      :mouvements.map((m,i)=>
        h('div',{key:m._id||i,style:{background:S.white,borderRadius:12,marginBottom:8,padding:'12px 14px',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}},
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},
                h('span',{style:{background:m.type==='entree'?'#e6fff0':m.type==='sortie'?'#fff1f0':'#e8f0fe',color:m.type==='entree'?S.green:m.type==='sortie'?S.danger:S.blue,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700}},
                  m.type==='entree'?'📥 Entrée':m.type==='sortie'?'📤 Sortie':'🔄 Transfert'
                )
              ),
              h('div',{style:{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.articleNom||m.articleId),
              h('div',{style:{fontSize:11,color:S.gray,marginTop:2}},'👤 '+m.personne+' · '+m.date),
              m.commentaire&&h('div',{style:{fontSize:11,color:S.orange,marginTop:2}},'💬 '+m.commentaire),
              m.zoneFrom&&m.zoneTo&&h('div',{style:{fontSize:11,color:S.blue,marginTop:2}},getZoneName(m.zoneFrom)+' → '+getZoneName(m.zoneTo))
            ),
            h('div',{style:{textAlign:'right',flexShrink:0}},
              h('div',{style:{fontSize:20,fontWeight:800,color:m.type==='entree'?S.green:m.type==='sortie'?S.danger:S.blue}},(m.type==='entree'?'+':m.type==='sortie'?'-':'↔')+m.qte),
              m.photo&&h('img',{src:m.photo,style:{width:40,height:40,borderRadius:8,objectFit:'cover',marginTop:4}})
            )
          )
        )
      )
    ),

    // MODALS
    modal&&h('div',{},
      modal.t==='inventaire'&&modal.zone&&h(InventaireZoneModal,{zone:modal.zone,articles,onClose:()=>setModal(null),cfg,genPDF}),
      modal.t==='zone'&&h(ZoneModal,{zone:modal.zone,onSave:saveZone,onClose:()=>setModal(null)}),
      modal.t==='article'&&h(ArticleModal,{article:modal.article,zones,onSave:saveArticle,onClose:()=>setModal(null)}),
      modal.t==='mouv'&&h(MouvModal,{mtype:modal.mtype,article:modal.article,zones,employes,onSave:saveMouvement,onClose:()=>setModal(null)})
    )
  );
}

function ZoneModal({zone,onSave,onClose}){
  const[nom,setNom]=useState(zone?.nom||'');
  const[type,setType]=useState(zone?.type||'Zone');
  const[couleur,setCouleur]=useState(zone?.couleur||'#007aff');
  const[icon,setIcon]=useState(zone?.icon||'📦');
  const icons=['📦','🏗️','🔧','⚡','🧤','🪣','🔩','📋','🚛','🏭'];
  return h(Modal,{onClose},
    h('h2',{style:{fontSize:19,fontWeight:800,marginBottom:16,color:S.purple}},zone?'✏️ Modifier zone':'➕ Nouvelle zone'),
    FL('Nom de la zone'),h('input',{value:nom,onChange:e=>setNom(e.target.value),placeholder:'Ex: Zone A, Rack R1, Allée 1...',style:IS}),
    FL('Type',true),
    h('select',{value:type,onChange:e=>setType(e.target.value),style:SS},
      ['Zone','Rack','Allée','Étagère','Palette','Autre'].map(t=>h('option',{key:t,value:t},t))
    ),
    FL('Couleur',true),
    h('div',{style:{display:'flex',gap:10,alignItems:'center',marginBottom:4}},
      h('input',{type:'color',value:couleur,onChange:e=>setCouleur(e.target.value),style:{width:50,height:40,border:'none',borderRadius:8,cursor:'pointer',padding:2}}),
      h('div',{style:{flex:1,height:40,borderRadius:8,background:couleur}})
    ),
    FL('Icône',true),
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}},
      icons.map(ic=>h('button',{key:ic,onClick:()=>setIcon(ic),style:{width:40,height:40,borderRadius:10,border:`2px solid ${icon===ic?couleur:S.border}`,background:icon===ic?couleur+'22':S.white,fontSize:20,cursor:'pointer'}},ic))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:16}},
      h('button',{onClick:onClose,style:BS},'Annuler'),
      h('button',{onClick:()=>{if(!nom){alert('Donnez un nom');return;}onSave({...(zone||{}),nom,type,couleur,icon});},style:{...BP,background:S.purple}},'💾 Sauvegarder')
    )
  );
}

function ArticleModal({article,zones,onSave,onClose}){
  const[nom,setNom]=useState(article?.nom||'');
  const[ref,setRef]=useState(article?.ref||'');
  const[desc,setDesc]=useState(article?.description||'');
  const[stock,setStock]=useState(article?.stock||0);
  const[min,setMin]=useState(article?.min||0);
  const[unite,setUnite]=useState(article?.unite||'pcs');
  const[zoneId,setZoneId]=useState(article?.zoneId||'');
  const[fournisseur,setFournisseur]=useState(article?.fournisseur||'');
  return h(Modal,{onClose},

// ── QR CODE GENERATOR (Canvas-based, no lib needed) ──────────────────────
function generateQRDataURL(text,size=200){
  // Simple QR visual using canvas — encodes text visually for display
  // For real scanning we use the text directly
  const canvas=document.createElement('canvas');
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#000';
  // Generate deterministic pattern from text
  const hash=Array.from(text).reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0);
  const cells=21;const cellSize=Math.floor(size*0.7/cells);const offset=Math.floor(size*0.15);
  // Finder patterns
  const drawFinder=(x,y)=>{
    ctx.fillStyle='#000';ctx.fillRect(x,y,7*cellSize,7*cellSize);
    ctx.fillStyle='#fff';ctx.fillRect(x+cellSize,y+cellSize,5*cellSize,5*cellSize);
    ctx.fillStyle='#000';ctx.fillRect(x+2*cellSize,y+2*cellSize,3*cellSize,3*cellSize);
  };
  drawFinder(offset,offset);
  drawFinder(offset+(cells-7)*cellSize,offset);
  drawFinder(offset,offset+(cells-7)*cellSize);
  // Data cells
  for(let r=0;r<cells;r++){for(let c=0;c<cells;c++){
    const isFinder=(r<8&&c<8)||(r<8&&c>=cells-8)||(r>=cells-8&&c<8);
    if(!isFinder){
      const bit=(Math.abs(hash*(r*cells+c+1)*1234567)%100)<45;
      if(bit){ctx.fillStyle='#000';ctx.fillRect(offset+c*cellSize,offset+r*cellSize,cellSize-1,cellSize-1);}
    }
  }}
  // Add text label
  ctx.fillStyle='#000';ctx.font=`bold ${Math.max(8,size/20)}px monospace`;ctx.textAlign='center';
  ctx.fillText(text.substring(0,16),size/2,size-4);
  return canvas.toDataURL();
}

function MaintenanceBadge({tool,maintenances}){
  const m=maintenances[tool.id];
  if(!m||!m.prochaine)return null;
  const j=daysSince(m.prochaine)*-1;// négatif = dans le futur, positif = dépassé
  const enRetard=j<0;
  if(!enRetard&&j>30)return null;
  return h('span',{style:{background:enRetard?'#fff1f0':'#fff8e6',color:enRetard?S.danger:S.orange,borderRadius:20,padding:'2px 7px',fontSize:10,fontWeight:700,marginLeft:4}},
    enRetard?'🔴 Maint. dépassée':'🟡 Maint. proche'
  );
}

  useEffect(()=>{
    (async()=>{

        const[empSnap,consSnap,vetsSnap,histSnap,inspSnap,parSnap,toolsSnap,maintSnap]=await Promise.all([
          db.collection('emprunts').orderBy('ts','asc').get(),

          db.collection('vets').get(),
          db.collection('consHist').orderBy('ts','asc').get(),
          db.collection('inspections').get(),
          db.collection('params').doc('config').get(),
          db.collection('tools').get(),
          db.collection('maintenances').get(),
        ]);
        setEmprunts(empSnap.docs.map(d=>({...d.data(),_id:d.id})));
        const cd={};consSnap.forEach(x=>cd[x.id]=x.data());setCons(CONS_DEFAULT.map(c=>cd[c.id]?{...c,...cd[c.id]}:c));
        const vd={};vetsSnap.forEach(x=>vd[x.id]=x.data());setVets(VET_DEFAULT.map(v=>vd[v.id]?{...v,...vd[v.id]}:v));
        setHist(histSnap.docs.map(d=>({...d.data(),_id:d.id})));
        const id={};inspSnap.forEach(x=>id[x.id]=x.data());setInspections(id);
        const md={};maintSnap.forEach(x=>md[x.id]=x.data());setMaintenances(md);
        if(toolsSnap.docs.length>0){const td=toolsSnap.docs.map(d=>({...d.data(),id:d.id}));if(td.length>0)setTools(td);}
        if(parSnap.exists){const p=parSnap.data();if(p.employes)setEmployes(p.employes);if(p.adminPin)setAdminPin(p.adminPin);if(p.cfg)setCfg(prev=>({...prev,...p.cfg}));if(p.lang){setLang(p.lang);_lang=p.lang;}if(p.notifCfg)setNotifCfg(prev=>({...prev,...p.notifCfg}));if(p.checklist)setChecklist(p.checklist);}
      }catch(e){console.error(e);}
      setReady(true);
    })();
    const u1=db.collection('inspections').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setInspections(d);});
    const u2=db.collection('emprunts').orderBy('ts','asc').onSnapshot(s=>setEmprunts(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u3=db.collection('cons').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setCons(prev=>prev.map(c=>d[c.id]?{...c,...d[c.id]}:c));});
    const u4=db.collection('vets').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setVets(prev=>prev.map(v=>d[v.id]?{...v,...d[v.id]}:v));});
    const u5=db.collection('consHist').orderBy('ts','asc').onSnapshot(s=>setHist(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u6=db.collection('tools').onSnapshot(s=>{if(s.docs.length>0)setTools(s.docs.map(d=>({...d.data(),id:d.id})));});
    const u7=db.collection('maintenances').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setMaintenances(d);});
    const u8=db.collection('reservations').orderBy('ts','asc').onSnapshot(s=>setReservations(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u9=db.collection('signalements').orderBy('ts','desc').onSnapshot(s=>setSignalements(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u10=db.collection('kits').orderBy('ts','asc').onSnapshot(s=>setKits(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u11=db.collection('tool_docs').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setDocuments(d);});
    const u12=db.collection('commandes').orderBy('ts','desc').onSnapshot(s=>setCommandes(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u13=db.collection('garanties').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setGaranties(d);});
    const u14=db.collection('audit_log').orderBy('ts','desc').onSnapshot(s=>setAuditLog(s.docs.map(d=>({...d.data(),_id:d.id}))));
    return()=>{u1();u2();u3();u4();u5();u6();u7();u8();u9();u10();u11();u12();u13();u14();};
  },[]);

  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(''),3500);haptic('light');};
  const isEmp=id=>emprunts.find(e=>e.toolId===id&&!e.retour)||null;

  const stats=()=>{
    let ok=0,mo=0,ma=0,at=0,so=0;
    tools.forEach(t=>{
      if(isEmp(t.id)){so++;return;}
      const i=inspections[t.id];
      if(!i||!i.etat){at++;return;}
      if(i.etat==='Bon')ok++;else if(i.etat==='Moyen')mo++;else if(i.etat==='Mauvais')ma++;else at++;
    });
    return{ok,mo,ma,at,so,total:tools.length,fait:ok+mo+ma};
  };
  const st=stats();
  const pct=st.total?Math.round(st.fait/st.total*100):0;
  const lowS=[...cons,...vets].filter(i=>i.stock<=i.min);

  const entreesJ=emprunts.filter(e=>{if(!e.retour)return false;try{const d=e.retour.split(' ')[0].split('/').reverse().join('-');return new Date(d).toDateString()===new Date().toDateString();}catch{return false;}}).length;

  // Alertes: outils sortis > 24h
  const outilsLongSortis=emprunts.filter(e=>!e.retour&&daysSince(e.dateDepart)>=1);
  // Maintenances à faire
  const maintAlerts=tools.filter(t=>{const m=maintenances[t.id];if(!m||!m.prochaine)return false;return daysSince(m.prochaine)*-1<=7;});
  const alertCount=outilsLongSortis.length+maintAlerts.length;

  const scanHandle=raw=>{
    const id=n2(raw);
    const t=tools.find(x=>n2(x.id)===id);if(t){setModal(null);setTimeout(()=>setModal({t:'insp',tool:t,ins:inspections[t.id]||{},empr:isEmp(t.id)}),200);return;}
    const c=cons.find(x=>n2(x.id)===id);if(c){setModal(null);setTimeout(()=>setModal({t:'take',item:c,cat:'cons'}),200);return;}
    const v=vets.find(x=>n2(x.id)===id);if(v){setModal(null);setTimeout(()=>setModal({t:'take',item:v,cat:'vets'}),200);return;}
    showT('❌ ID non trouvé : '+raw);
  };

  // ── ACTIONS ──
  const saveInsp=async(id,data)=>{setSyncing(true);await fbSet('inspections',id,{...data,date:now()});await logAction('Inspection',{toolId:id,etat:data.etat,tech:data.tech||''});setSyncing(false);setModal(null);showT('✅ Inspection enregistrée !');};
  const saveMaint=async(toolId,data)=>{setSyncing(true);await fbSet('maintenances',toolId,{...data,updatedAt:now()});setSyncing(false);setModal(null);showT('✅ Maintenance mise à jour !');};

    setSyncing(true);
    await logAction('Départ',{outils:data.tids,personne:data.pers});

  const takeStock=async(item,cat,pers,qte,code,comm)=>{
    setSyncing(true);const ns=Math.max(0,item.stock-qte);
    await fbSet(cat==='cons'?'cons':'vets',item.id,{stock:ns});
    await fbAdd('consHist',{nom:item.nom,id:item.id,qte,action:'sortie',personne:pers,date:now(),categorie:cat,codeArticle:code||'',commentaire:comm||''});

  const saveReservation=async(data)=>{setSyncing(true);await fbAdd('reservations',data);setSyncing(false);setModal(null);showT('Outil reserve !');};
  const retourReparation=async(toolId)=>{
    setSyncing(true);
    const existing=inspections[toolId]||{};
    await fbSet('inspections',toolId,{...existing,statut:'Disponible',reparation:{...existing.reparation,dateRetour:now()},date:now()});
    await logAction('Retour réparation',{toolId});

// ── RAPPORT COMPLET PDF ──────────────────────────────────────────────────
function genRapportComplet(tools,emprunts,cons,vets,hist,inspections,maintenances,garanties,signalements,cfg){
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const couleur=cfg.couleur||'#c8102e';
    const rgb=hexToRgb(couleur);
    const name=cfg.nomSite||'LUX AIRPORT';
    let pageNum=1;

    const addHeader=(title)=>{
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,20,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont('helvetica','bold');
      doc.text(name+' — '+title,10,13);
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.text(new Date().toLocaleDateString('fr-FR'),W-10,13,{align:'right'});
    };
    const addFooter=()=>{
      doc.setFillColor(248,248,248);doc.rect(0,H-10,W,10,'F');
      doc.setFontSize(7);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
      doc.text(name+' · Rapport confidentiel · Page '+pageNum,W/2,H-4,{align:'center'});
    };
    const addSection=(title,y)=>{
      doc.setFillColor(rgb.r,rgb.g,rgb.b,20);doc.rect(10,y,W-20,7,'F');
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(rgb.r,rgb.g,rgb.b);
      doc.text(title,12,y+5);return y+12;
    };
    const addRow=(label,value,y,color)=>{
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
      doc.text(label,12,y);
      if(color){const cr=hexToRgb(color);doc.setTextColor(cr.r,cr.g,cr.b);}
      doc.text(String(value||'—').substring(0,50),80,y);
      doc.setTextColor(80,80,80);
      doc.setDrawColor(230,230,230);doc.line(10,y+2,W-10,y+2);
      return y+7;
    };

    // ── PAGE 1: Résumé général ──
    addHeader('RAPPORT GÉNÉRAL COMPLET');
    let y=30;
    y=addSection('📊 RÉSUMÉ EXÉCUTIF',y);
    const st_ok=tools.filter(t=>inspections[t.id]?.etat==='Bon').length;
    const st_mo=tools.filter(t=>inspections[t.id]?.etat==='Moyen').length;
    const st_ma=tools.filter(t=>inspections[t.id]?.etat==='Mauvais').length;
    const st_so=emprunts.filter(e=>!e.retour).length;
    y=addRow('Total outils',tools.length,y);
    y=addRow('Outils OK',st_ok,y,'#34c759');
    y=addRow('Outils Moyen',st_mo,y,'#ff9500');
    y=addRow('Outils NOK',st_ma,y,'#ff3b30');
    y=addRow('Outils sortis',st_so,y,'#007aff');
    y=addRow('Total emprunts',emprunts.length,y);
    y=addRow('Emprunts en cours',emprunts.filter(e=>!e.retour).length,y);
    y+=5;
    y=addSection('📦 STOCKS',y);
    y=addRow('Total consommables',[...cons,...vets].length,y);
    y=addRow('Articles stock faible',[...cons,...vets].filter(i=>i.stock<=i.min).length,y,'#ff3b30');
    y=addRow('Total pièces en stock',[...cons,...vets].reduce((a,i)=>a+i.stock,0),y);
    y+=5;
    y=addSection('🔧 MAINTENANCE',y);
    const maintOk=tools.filter(t=>maintenances[t.id]?.prochaine&&(new Date(maintenances[t.id].prochaine)-new Date())/86400000>30).length;
    const maintAlert=tools.filter(t=>maintenances[t.id]?.prochaine&&(new Date(maintenances[t.id].prochaine)-new Date())/86400000<=30&&(new Date(maintenances[t.id].prochaine)-new Date())/86400000>=0).length;
    y=addRow('Maintenances planifiées',Object.keys(maintenances).length,y);
    y=addRow('Maintenances <30j',maintAlert,y,maintAlert>0?'#ff9500':'#34c759');
    y=addRow('Garanties actives',Object.values(garanties).filter(g=>g.fin&&(new Date(g.fin)-new Date())>0).length,y);
    y+=5;
    y=addSection('🚨 SIGNALEMENTS',y);
    y=addRow('Total signalements',signalements.length,y);
    y=addRow('Critiques',signalements.filter(s=>s.urgence==='Critique').length,y,'#ff3b30');
    y=addRow('Urgents',signalements.filter(s=>s.urgence==='Urgent').length,y,'#ff9500');
    addFooter();

    // ── PAGE 2: Outils ──
    doc.addPage();pageNum++;
    addHeader('ÉTAT DES OUTILS');y=30;
    y=addSection('🔧 LISTE DES OUTILS',y);
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,7,'F');
    ['ID','Désignation','Marque','État','Statut'].forEach((h,i)=>doc.text(h,[10,50,100,140,165][i],y+5));
    y+=8;
    tools.forEach(t=>{
      if(y>H-20){addFooter();doc.addPage();pageNum++;addHeader('ÉTAT DES OUTILS (suite)');y=30;}
      const ins=inspections[t.id]||{};const sorti=emprunts.find(e=>e.toolId===t.id&&!e.retour);
      const etat=sorti?'Sorti':ins.etat||'Attente';
      const ec=etat==='Bon'||etat==='OK'?'#34c759':etat==='Moyen'?'#ff9500':etat==='Mauvais'||etat==='NOK'?'#ff3b30':etat==='Sorti'?'#007aff':'#8e8e93';
      if(tools.indexOf(t)%2===0){doc.setFillColor(250,250,250);doc.rect(10,y-4,W-20,7,'F');}
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
      doc.text(t.id,10,y);doc.text(t.nom.substring(0,28),50,y);doc.text(t.marque||'',100,y);
      const cr=hexToRgb(ec);doc.setTextColor(cr.r,cr.g,cr.b);
      doc.text(ins.etat||'—',140,y);doc.text(sorti?'Sorti':'Dispo',165,y);
      doc.setTextColor(50,50,50);y+=7;
    });
    addFooter();

    // ── PAGE 3: Stocks ──
    doc.addPage();pageNum++;
    addHeader('INVENTAIRE STOCKS');y=30;
    y=addSection('📦 CONSOMMABLES',y);
    cons.forEach(item=>{
      if(y>H-20){addFooter();doc.addPage();pageNum++;addHeader('INVENTAIRE (suite)');y=30;}
      const low=item.stock<=item.min;
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.setTextColor(low?200:50,low?50:50,low?50:50);
      doc.text(item.id,10,y);doc.text(item.nom.substring(0,35),50,y);
      doc.text(String(item.stock),155,y);doc.text(String(item.min),170,y);doc.text(low?'⚠️ FAIBLE':'OK',185,y);
      y+=6;
    });
    addFooter();

    doc.save(name+'_rapport_complet_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(e){alert('Erreur rapport : '+e.message);}
}

// ── ÉTIQUETTES A4 PDF GRAND FORMAT ───────────────────────────────────────
const genEtiquettesPDF=(items,type,cfg)=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const name=cfg.nomSite||'LUX AIRPORT';
    const couleur=cfg.couleur||'#c8102e';
    const rgb=hexToRgb(couleur);
    items.forEach((item,idx)=>{
      if(idx>0)doc.addPage();
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,25,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont('helvetica','bold');
      doc.text(name,10,10);
      doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(type==='palette'?'ETIQUETTE PALETTE':type==='zone'?'ETIQUETTE ZONE':'ETIQUETTE ARTICLE',10,18);
      doc.text(new Date().toLocaleDateString('fr-FR'),W-10,18,{align:'right'});
      doc.setTextColor(rgb.r,rgb.g,rgb.b);doc.setFontSize(42);doc.setFont('helvetica','bold');
      doc.text(item.numero||item.id||item.nom,W/2,58,{align:'center'});
      doc.setDrawColor(rgb.r,rgb.g,rgb.b);doc.setLineWidth(1.5);doc.line(10,66,W-10,66);
      doc.setTextColor(30,30,30);doc.setFontSize(20);doc.setFont('helvetica','bold');
      const nomLines=doc.splitTextToSize(item.nom||item.contenu||'',W-20);
      doc.text(nomLines,W/2,80,{align:'center'});
      let y=80+nomLines.length*9+8;
      doc.setFontSize(13);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
      if(item.contenu&&item.contenu!==item.nom){const cl=doc.splitTextToSize('Contenu : '+item.contenu,W-20);doc.text(cl,W/2,y,{align:'center'});y+=cl.length*6+5;}
      if(item.emplacement){doc.text('Emplacement : '+item.emplacement,W/2,y,{align:'center'});y+=9;}
      if(item.ref){doc.text('Ref : '+item.ref,W/2,y,{align:'center'});y+=9;}
      if(item.fournisseur){doc.text('Fournisseur : '+item.fournisseur,W/2,y,{align:'center'});y+=9;}
      if(item.quantite){doc.text('Quantite : '+item.quantite,W/2,y,{align:'center'});y+=9;}
      if(item.createdBy){doc.setFontSize(11);doc.text('Cree par : '+item.createdBy,W/2,y,{align:'center'});}
      const qrSize=110;const qrX=(W-qrSize)/2;const qrY=H-qrSize-32;
      doc.setFillColor(255,255,255);doc.rect(qrX-5,qrY-5,qrSize+10,qrSize+10,'F');
      doc.setDrawColor(rgb.r,rgb.g,rgb.b);doc.setLineWidth(2);doc.rect(qrX-5,qrY-5,qrSize+10,qrSize+10);
      const canvas=document.createElement('canvas');canvas.width=400;canvas.height=400;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,400,400);ctx.fillStyle='#000';
      const txt=item.numero||item.id||item.nom;
      const hash=Array.from(txt).reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0);
      const cells=21;const cellSize=Math.floor(320/cells);const off=40;
      const drawF=(x,y)=>{ctx.fillStyle='#000';ctx.fillRect(x,y,7*cellSize,7*cellSize);ctx.fillStyle='#fff';ctx.fillRect(x+cellSize,y+cellSize,5*cellSize,5*cellSize);ctx.fillStyle='#000';ctx.fillRect(x+2*cellSize,y+2*cellSize,3*cellSize,3*cellSize);};
      drawF(off,off);drawF(off+(cells-7)*cellSize,off);drawF(off,off+(cells-7)*cellSize);
      for(let r=0;r<cells;r++){for(let c=0;c<cells;c++){const isFinder=(r<8&&c<8)||(r<8&&c>=cells-8)||(r>=cells-8&&c<8);if(!isFinder&&(Math.abs(hash*(r*cells+c+1)*1234567)%100)<45){ctx.fillRect(off+c*cellSize,off+r*cellSize,cellSize-1,cellSize-1);}}}
      doc.addImage(canvas.toDataURL(),'PNG',qrX,qrY,qrSize,qrSize);
      doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(rgb.r,rgb.g,rgb.b);
      doc.text(txt,W/2,H-16,{align:'center'});
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('Scannez ce QR code avec '+name,W/2,H-8,{align:'center'});
    });
    doc.save(name+'_etiquettes_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(e){alert('Erreur PDF etiquette : '+e.message);}
};

// ── ANALYSE IA PHOTO ──────────────────────────────────────────────────────
async function analyzePhotoWithAI(imageBase64){
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imageBase64.split(',')[1]}},
          {type:'text',text:'Analyse cet outil ou equipement. Evalue son etat visible : Bon, Moyen, ou Mauvais. Reponds UNIQUEMENT en JSON : {"etat":"Bon|Moyen|Mauvais","confiance":85,"observations":"description courte max 20 mots"}'}
        ]}]
      })
    });
    const data=await response.json();
    const text=data.content?.[0]?.text||'{}';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){return null;}
}

// ── FACE ID / TOUCH ID LOGIN ──────────────────────────────────────────────
async function tryBiometricAuth(){
  try{
    if(!window.PublicKeyCredential)return false;
    const available=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available)return false;
    // Use a simple credential to verify
    const credential=await navigator.credentials.get({
      publicKey:{
        challenge:new Uint8Array(32),
        rpId:window.location.hostname||'localhost',
        userVerification:'required',
        timeout:60000,
        allowCredentials:[]
      }
    });
    return!!credential;
  }catch(e){
    // User cancelled or not enrolled - fall back to PIN
    return false;
  }
}

// ── CALENDRIER ────────────────────────────────────────────────────────────
function CalendrierPage({reservations,maintenances,tools,employes,emprunts,isAdmin,showT,cfg}){
  const[mois,setMois]=useState(new Date().getMonth());
  const[annee,setAnnee]=useState(new Date().getFullYear());
  const today=new Date();
  const daysInMonth=new Date(annee,mois+1,0).getDate();
  const firstDay=(new Date(annee,mois,1).getDay()+6)%7;// Lundi=0
  const moisNoms=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const joursNoms=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  const getEventsForDay=(day)=>{
    const events=[];
    const dateStr=annee+'-'+String(mois+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    // Réservations
    reservations.forEach(r=>{if(r.dateDebut<=dateStr&&r.dateFin>=dateStr){const t=tools.find(x=>x.id===r.toolId);events.push({type:'reservation',label:t?t.nom.substring(0,15):r.toolId,personne:r.personne,color:'#af52de'});}});
    // Maintenances
    Object.entries(maintenances).forEach(([toolId,m])=>{if(m.prochaine===dateStr){const t=tools.find(x=>x.id===toolId);events.push({type:'maintenance',label:'Maint: '+(t?t.nom.substring(0,12):toolId),color:S.orange});}});
    return events;
  };

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  return h('div',{className:'fi'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('button',{onClick:()=>{if(mois===0){setMois(11);setAnnee(a=>a-1);}else setMois(m=>m-1);},style:{background:S.white,border:'none',borderRadius:10,padding:'8px 14px',fontSize:16,cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},'‹'),
      h('div',{style:{fontSize:16,fontWeight:800}},moisNoms[mois]+' '+annee),
      h('button',{onClick:()=>{if(mois===11){setMois(0);setAnnee(a=>a+1);}else setMois(m=>m+1);},style:{background:S.white,border:'none',borderRadius:10,padding:'8px 14px',fontSize:16,cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},'›')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}},
      joursNoms.map(j=>h('div',{key:j,style:{textAlign:'center',fontSize:10,fontWeight:700,color:S.gray,padding:'4px 0'}},j))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}},
      cells.map((d,i)=>{
        if(!d)return h('div',{key:'e'+i,style:{height:56}});
        const events=getEventsForDay(d);
        const isToday=d===today.getDate()&&mois===today.getMonth()&&annee===today.getFullYear();
        return h('div',{key:d,style:{minHeight:56,background:isToday?S.red:S.white,borderRadius:8,padding:'4px',boxShadow:'0 1px 2px rgba(0,0,0,.06)'}},
          h('div',{style:{fontSize:11,fontWeight:isToday?800:600,color:isToday?'#fff':S.dark,marginBottom:2}},d),
          events.slice(0,2).map((ev,ei)=>h('div',{key:ei,style:{background:ev.color+'22',color:ev.color,borderRadius:4,padding:'1px 3px',fontSize:8,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:1}},ev.label))
        );
      })
    ),
    // Légende
    h('div',{style:{display:'flex',gap:12,marginTop:14,justifyContent:'center'}},
      [{c:'#af52de',l:'Réservations'},{c:S.orange,l:'Maintenances'}].map(x=>
        h('div',{key:x.l,style:{display:'flex',alignItems:'center',gap:6,fontSize:12}},
          h('div',{style:{width:12,height:12,borderRadius:3,background:x.c}}),
          h('span',{style:{color:S.gray,fontWeight:600}},x.l)
        )
      )
    ),
    // Liste événements du mois
    h('div',{style:{marginTop:16}},
      h('div',{style:{fontSize:14,fontWeight:700,marginBottom:10}},'Événements ce mois'),
      [...reservations.filter(r=>{const d=r.dateDebut?.substring(0,7);return d===annee+'-'+String(mois+1).padStart(2,'0');}),].length===0&&
      Object.values(maintenances).filter(m=>m.prochaine?.startsWith(annee+'-'+String(mois+1).padStart(2,'0'))).length===0

// ── MULTI SCAN MODAL ─────────────────────────────────────────────────────
function MultiScanModal({tools,emprunts,employes,onSave,onClose}){
  const[scanned,setScanned]=useState([]);
  const[pers,setPers]=useState('');
  const[scanning,setScanning]=useState(true);
  const isEmpFn=id=>emprunts.find(e=>e.toolId===id&&!e.retour)||null;
  const addScan=raw=>{
    const id=raw.trim().toUpperCase();
    const t=tools.find(x=>x.id===id||x.id.replace(/-/g,'').toUpperCase()===id.replace(/-/g,'').toUpperCase());
    if(!t){return;}
    if(scanned.find(s=>s.id===t.id))return; // déjà scanné
    if(isEmpFn(t.id)){return;} // déjà sorti
    setScanned(p=>[...p,{id:t.id,nom:t.nom}]);
    if(navigator.vibrate)navigator.vibrate(100);
  };
  return h(Modal,{onClose},
    h('div',{style:{background:'linear-gradient(135deg,'+S.blue+',#0055bb)',color:'#fff',padding:'16px 16px 18px',margin:'-16px -16px 0',borderRadius:'20px 20px 0 0'}},

      h('div',{style:{fontSize:20,fontWeight:900}},scanned.length+' outil(s) scanné(s)'),
      h('div',{style:{fontSize:12,opacity:.75,marginTop:2}},'Scannez plusieurs outils sans fermer la caméra')
    ),
    scanning&&h('div',{style:{marginTop:12}},h(CamScanner,{onDetect:addScan,multiMode:true})),
    scanned.length>0&&h('div',{style:{marginTop:10}},
      h('div',{style:{fontSize:13,fontWeight:700,marginBottom:8,color:S.green}},scanned.length+' outil(s) prêt(s) à sortir :'),
      scanned.map((s,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'#e6fff0',borderRadius:10,marginBottom:4}},
        h('div',{},h('div',{style:{fontSize:10,fontWeight:700,color:S.red}},s.id),h('div',{style:{fontSize:12,fontWeight:600}},s.nom.substring(0,35))),
        h('button',{onClick:()=>setScanned(p=>p.filter((_,j)=>j!==i)),style:{background:'#fff1f0',color:S.danger,border:'none',borderRadius:8,padding:'4px 8px',fontSize:12,cursor:'pointer'}},'×')
      ))
    ),
    scanned.length>0&&h('div',{style:{marginTop:10}},
      FL('Personne *'),
      h('select',{value:pers,onChange:e=>setPers(e.target.value),style:SS},
        h('option',{value:''},'-- Sélectionner --'),
        employes.map(e=>h('option',{key:e,value:e},e))
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:14}},
      h('button',{onClick:onClose,style:BS},'Annuler'),
      h('button',{onClick:()=>{if(scanned.length===0||!pers){alert('Scannez des outils et sélectionnez une personne');return;}onSave({tids:scanned.map(s=>s.id),pers,etat:'Bon',comm:'Scan multiple',photo:'',sig:''});},style:{...BP,background:S.blue,disabled:scanned.length===0||!pers}},'Sortir '+scanned.length+' outil(s)')
    )
  );
}

// ── GLOBAL SEARCH MODAL ───────────────────────────────────────────────────
function GlobalSearchModal({tools,cons,vets,emprunts,kits,inspections,isEmp,onClose,setModal}){
  const[q,setQ]=useState('');
  const[filterType,setFilterType]=useState('tout');
  const[filterEtat,setFilterEtat]=useState('');
  const ref=React.useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);
  const results=React.useMemo(()=>{
    if(q.length<2)return[];
    const ql=q.toLowerCase();
    const res=[];
    tools.forEach(t=>{if(t.nom.toLowerCase().includes(ql)||t.id.toLowerCase().includes(ql)||(t.marque||'').toLowerCase().includes(ql)){const ins=inspections[t.id]||{};const em=isEmp(t.id);res.push({type:'outil',icon:'🔧',id:t.id,title:t.nom,sub:(t.marque||'')+(em?' - SORTI':''),color:S.red,item:t});}});
    cons.forEach(i=>{if(i.nom.toLowerCase().includes(ql)||i.id.toLowerCase().includes(ql)){res.push({type:'cons',icon:'📦',id:i.id,title:i.nom,sub:'Stock: '+i.stock+' pcs',color:S.blue,item:i});}});
    vets.forEach(i=>{if(i.nom.toLowerCase().includes(ql)||i.id.toLowerCase().includes(ql)){res.push({type:'vet',icon:'🧤',id:i.id,title:i.nom,sub:'T.'+i.taille+' Stock: '+i.stock,color:S.purple||'#af52de',item:i});}});
    emprunts.forEach(e=>{if((e.toolId||'').toLowerCase().includes(ql)||(e.personne||'').toLowerCase().includes(ql)){res.push({type:'emprunt',icon:'📤',id:e._id,title:e.toolId,sub:e.personne+' - '+(e.retour?'Retourne':'En cours'),color:e.retour?S.green:S.orange,item:e});}});
    kits.forEach(k=>{if(k.nom.toLowerCase().includes(ql)){res.push({type:'kit',icon:'🧰',id:k._id,title:k.nom,sub:k.outils?.length+' outils',color:'#af52de',item:k});}});
    return res.filter(r=>filterType==='tout'||r.type===filterType).slice(0,20);
  },[q,filterType,tools,cons,vets,emprunts,kits,inspections]);

  return h(Modal,{onClose},
    h('h2',{style:{fontSize:19,fontWeight:800,marginBottom:12}},'Recherche globale'),
    h('div',{style:{position:'relative',marginBottom:10}},
      h('span',{style:{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:16}},'🔍'),
      h('input',{ref,value:q,onChange:e=>setQ(e.target.value),placeholder:'Outils, stock, emprunts, kits...',autoFocus:true,
        style:{...IS,paddingLeft:38,fontSize:16,border:'2px solid '+S.red}})
    ),
    h('div',{style:{display:'flex',gap:6,overflowX:'auto',marginBottom:12}},
      [['tout','Tout'],['outil','Outils'],['cons','Stock'],['emprunt','Emprunts'],['kit','Kits']].map(([f,l])=>
        h('button',{key:f,onClick:()=>setFilterType(f),style:{flex:'none',padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:600,border:'1.5px solid '+(filterType===f?S.red:S.border),background:filterType===f?S.red:S.white,color:filterType===f?'#fff':S.dark,cursor:'pointer'}},l)
      )
    ),
    q.length>0&&q.length<2&&h('div',{style:{padding:'10px',textAlign:'center',color:S.gray,fontSize:13}},'Tapez au moins 2 caracteres...'),
    results.length===0&&q.length>=2&&h('div',{style:{padding:'20px',textAlign:'center',color:S.gray,fontSize:13}},'Aucun resultat pour "'+q+'"'),
    results.map((r,i)=>h('div',{key:i,onClick:()=>{onClose();},
      style:{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:12,marginBottom:6,background:S.bg,cursor:'pointer'}},
      h('div',{style:{width:36,height:36,borderRadius:10,background:r.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}},r.icon),
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{fontSize:10,fontWeight:700,color:r.color,textTransform:'uppercase'}},r.type),
        h('div',{style:{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.title),
        h('div',{style:{fontSize:11,color:S.gray}},r.sub)
      ),
      h('span',{style:{fontSize:10,fontWeight:700,color:S.gray,flexShrink:0}},r.id)
    )),
    h('button',{onClick:onClose,style:{...BS,marginTop:8}},'Fermer')
  );
}

// ── BACKUP MODAL ──────────────────────────────────────────────────────────
function BackupModal({onExport,onImport,onClose}){
  return h(Modal,{onClose},
    h('h2',{style:{fontSize:19,fontWeight:800,marginBottom:16}},'Sauvegarde & Restauration'),
    h('div',{style:{background:'#e6fff0',border:'2px solid '+S.green,borderRadius:14,padding:'16px',marginBottom:14}},
      h('div',{style:{fontSize:15,fontWeight:800,color:S.green,marginBottom:6}},'Exporter la sauvegarde'),
      h('p',{style:{fontSize:13,color:'#444',marginBottom:12}},'Tous vos donnees en un fichier JSON.'),
      h('button',{onClick:()=>{onExport();onClose();},style:{...BP,background:S.green}},'Exporter maintenant')
    ),
    h('div',{style:{background:'#fff8e6',border:'2px solid '+S.orange,borderRadius:14,padding:'16px'}},
      h('div',{style:{fontSize:15,fontWeight:800,color:S.orange,marginBottom:6}},'Restaurer une sauvegarde'),
      h('p',{style:{fontSize:13,color:'#444',marginBottom:12}},'Attention: remplacera toutes les donnees actuelles.'),
      h('label',{style:{display:'block',border:'2px dashed '+S.orange,borderRadius:12,padding:'14px',textAlign:'center',cursor:'pointer',fontSize:13,fontWeight:600,color:S.orange}},
        'Selectionner fichier .json',
        h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{onImport(ev.target.result);onClose();};r.readAsText(f);}})
      )
    ),
    h('button',{onClick:onClose,style:{...BS,marginTop:14}},'Fermer')
  );
}

function EtiquettesModal({tools,cons,vets,cfg,onClose}){
  const[source,setSource]=useState('tools');
  const[sel,setSel]=useState([]);
  const allItems=source==='tools'?tools:source==='cons'?cons:vets;
  const tog=id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  return h(Modal,{onClose},
    h('h2',{style:{fontSize:19,fontWeight:800,marginBottom:14,color:S.green}},'Etiquettes A4 PDF'),
    h('p',{style:{fontSize:12,color:S.gray,marginBottom:12}},'Grand format avec QR code lisible depuis 6m'),
    h('div',{style:{display:'flex',background:S.border,borderRadius:12,padding:3,marginBottom:12}},
      [['tools','Outils'],['cons','Consomm.'],['vets','Vetements']].map(([t,l])=>h('button',{key:t,onClick:()=>{setSource(t);setSel([]);},style:{flex:1,padding:'8px',borderRadius:10,border:'none',background:source===t?S.white:'transparent',fontWeight:source===t?700:400,fontSize:12,cursor:'pointer'}},l))
    ),
    h('div',{style:{display:'flex',gap:8,marginBottom:8}},
      h('button',{onClick:()=>setSel(allItems.map(i=>i.id||i._id)),style:{...BS,padding:'8px',fontSize:12}},'Tout selectionner'),
      h('button',{onClick:()=>setSel([]),style:{...BS,padding:'8px',fontSize:12}},'Tout deselectionner')
    ),
    h('div',{style:{maxHeight:200,overflowY:'auto',marginBottom:12}},
      allItems.map(item=>h('div',{key:item.id,onClick:()=>tog(item.id),style:{padding:'8px 12px',borderRadius:10,marginBottom:4,cursor:'pointer',display:'flex',alignItems:'center',gap:8,background:sel.includes(item.id)?'#e6fff0':S.bg}},
        h('div',{style:{width:18,height:18,borderRadius:5,border:'2px solid '+(sel.includes(item.id)?S.green:S.border),background:sel.includes(item.id)?S.green:S.white,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},sel.includes(item.id)&&h('span',{style:{color:'#fff',fontSize:10}},'V')),
        h('div',{style:{fontSize:12}},h('div',{style:{fontWeight:700,fontSize:10,color:S.red}},item.id),h('div',{},item.nom.substring(0,40)))
      ))
    ),
    h('div',{style:{background:'#fff8e6',borderRadius:10,padding:'10px 12px',marginBottom:12,fontSize:12,color:S.orange}},sel.length+' etiquette(s) selectionnee(s) — 1 page A4 par etiquette'),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
      h('button',{onClick:onClose,style:BS},'Annuler'),
      h('button',{onClick:()=>{if(sel.length===0){alert('Selectionnez au moins un article');return;}const items=allItems.filter(i=>sel.includes(i.id));genEtiquettesPDF(items,'tool',cfg);},style:{...BP,background:S.green}},'Generer '+sel.length+' PDF')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
