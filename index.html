// ── PDF PALETTE A4 PAYSAGE ────────────────────────────────────────────────────
function generatePalettePDF(pal,cfg,famille){
try{
const{jsPDF}=window.jspdf;
const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
const W=297,H=210;
const name=cfg.nomSite||'LUX AIRPORT';
const rgb=hexToRgb(cfg.couleur||'#c8102e');
// Header
doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,18,'F');
doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');
doc.text(name+' — Gestion Airside',10,12);
doc.setFontSize(9);doc.setFont('helvetica','normal');
doc.text('Fiche Palette · '+new Date().toLocaleString('fr-FR'),W-10,12,{align:'right'});
// Séparateur vertical
doc.setDrawColor(220,220,220);doc.setLineWidth(0.5);doc.line(W/2,18,W/2,H-14);
// QR Code côté gauche
let qrImg=null;
try{const c=document.createElement('canvas');new window.QRious({element:c,value:pal.id,size:500,background:'white',foreground:'black',level:'H'});qrImg=c.toDataURL('image/png');}catch(e){}
const qrSize=95,qrX=(W/2-qrSize)/2,qrY=26;
if(qrImg){doc.setFillColor(255,255,255);doc.roundedRect(qrX-4,qrY-4,qrSize+8,qrSize+8,3,3,'F');doc.addImage(qrImg,'PNG',qrX,qrY,qrSize,qrSize);}
doc.setFontSize(36);doc.setFont('helvetica','bold');doc.setTextColor(28,28,30);
doc.text(pal.id,W/4,qrY+qrSize+16,{align:'center'});
doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);
doc.text('Scannez pour identifier cette palette',W/4,qrY+qrSize+23,{align:'center'});
// Côté droit
const rx=W/2+8;let ry=24;
if(famille){const fr=hexToRgb(famille.couleur||'#3498db');doc.setFillColor(fr.r,fr.g,fr.b);doc.roundedRect(rx,ry,W/2-16,10,2,2,'F');doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text('FAMILLE : '+famille.id+' — '+(famille.nom||''),rx+4,ry+7);ry+=14;}
const infos=[['Créé par',pal.createdBy||'—'],['Date création',pal.createdAt||'—'],['Provenance',pal.provenance||'—'],['Destination',pal.destination||'—'],['Statut',pal.statut||'En stock']];
infos.forEach(([l,v],i)=>{
if(i%2===0){doc.setFillColor(248,248,250);}else{doc.setFillColor(255,255,255);}
doc.rect(rx,ry,W/2-16,8,'F');
doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);doc.text(l.toUpperCase(),rx+3,ry+5.5);
doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.setFontSize(8);doc.text(String(v).substring(0,38),rx+40,ry+5.5);
ry+=8;
});
ry+=4;
doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(rx,ry,W/2-16,7,'F');
doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
doc.text('CONTENU — '+(pal.items||[]).length+' article(s)',rx+3,ry+5);ry+=9;
(pal.items||[]).forEach((item,i)=>{
if(ry>H-20)return;
if(i%2===0){doc.setFillColor(248,248,250);}else{doc.setFillColor(255,255,255);}
doc.rect(rx,ry,W/2-16,8,'F');
doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
doc.text((i+1)+'. '+item.nom.substring(0,34),rx+3,ry+5.5);
if(item.qte){doc.setFont('helvetica','bold');doc.setTextColor(0,122,255);doc.text('x'+item.qte,rx+W/2-22,ry+5.5,{align:'right'});}
doc.setDrawColor(240,240,240);doc.line(rx,ry+8,rx+W/2-16,ry+8);ry+=8;
});
if(pal.notes){ry+=4;doc.setFillColor(255,248,230);doc.roundedRect(rx,ry,W/2-16,14,2,2,'F');doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(180,120,0);doc.text('NOTES',rx+3,ry+5);doc.setFont('helvetica','normal');doc.setTextColor(100,70,0);doc.text(pal.notes.substring(0,60),rx+3,ry+11);}
// Footer
doc.setFillColor(28,28,30);doc.rect(0,H-14,W,14,'F');
doc.setTextColor(200,200,200);doc.setFontSize(8);doc.setFont('helvetica','normal');
doc.text([pal.id,pal.createdBy&&'Par: '+pal.createdBy,pal.provenance&&'De: '+pal.provenance,pal.destination&&'Vers: '+pal.destination].filter(Boolean).join('   ·   '),W/2,H-6,{align:'center'});
doc.text(name,10,H-6);doc.text(new Date().toLocaleDateString('fr-FR'),W-10,H-6,{align:'right'});
doc.save(pal.id+'_fiche.pdf');
}catch(e){alert('Erreur PDF: '+e.message);}
}

// ── EXPORT STOCK CSV ──────────────────────────────────────────────────────────
function exportStockCSV(palettes,familles){
const headers=['ID Palette','Famille ID','Famille Nom','Contenu','Quantités','Provenance','Destination','Emplacement Rack','Emplacement SOL','Emplacement Transit','Date Création','Créé par','Statut','Notes'];
const rows=palettes.map(pal=>{
const fam=findFamilleById(familles,pal.familleId);
const contenu=(pal.items||[]).map(i=>i.nom).join(' | ');
const qtes=(pal.items||[]).map(i=>i.qte||'').join(' | ');
const empRack=pal.allee&&pal.rack?pal.allee+'-R'+pal.rack+'-E'+(pal.etagere||'?')+'-'+(pal.position||'?'):'';
const empSOL=pal.emplacementSOL?('SOL-'+pal.solAllee+'-'+String(pal.solCase).padStart(2,'0')):'';
const empTransit=pal.emplacementTransit?('TRANSIT-'+pal.transitCase):'';
return[pal.id,fam?fam.id:'',fam?fam.nom:'',contenu,qtes,pal.provenance||'',pal.destination||'',empRack,empSOL,empTransit,(pal.createdAt||'').split(' ')[0]||'',pal.createdBy||'',pal.statut||'En stock',pal.notes||''];
});
const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\n');
const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='LuxAirport_Stock*'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

{id:"accueil",icon:"🏠",label:"Accueil",visible:true,order:0},

return()=>{window.removeEventListener("online",handleOnline);window.removeEventListener("offline",handleOffline);};
},[]);

useEffect(()=>{
const fallback=setTimeout(()=>setReady(true),5000);
(async()=>{
try{

if(parSnap.exists){
const p=parSnap.data();
if(p.employes)setEmployes(p.employes);

if(p.navConfig)setNavConfig(p.navConfig);
if(p.userAccounts)setUserAccounts(p.userAccounts);
if(p.warehouseConfig)setWarehouseConfig(p.warehouseConfig);
}
const load=async(fn)=>{try{return await Promise.race([fn(),new Promise(r=>setTimeout(()=>r(null),4000))]);}catch(e){return null;}};
const[empSnap,consSnap,vetsSnap,histSnap,inspSnap,toolsSnap,maintSnap,kitsSnap]=await Promise.all([
load(()=>db.collection("emprunts").orderBy("ts","asc").get()),
load(()=>db.collection("cons").get()),
load(()=>db.collection("vets").get()),
load(()=>db.collection("consHist").orderBy("ts","asc").get()),
load(()=>db.collection("inspections").get()),
load(()=>db.collection("tools").get()),
load(()=>db.collection("maintenances").get()),
load(()=>db.collection("kits").orderBy("ts","asc").get()),
]);

if(inspSnap){const id={};inspSnap.forEach(x=>id[x.id]=x.data());setInspections(id);}
if(maintSnap){const md={};maintSnap.forEach(x=>md[x.id]=x.data());setMaintenances(md);}
if(kitsSnap)setKits(kitsSnap.docs.map(d=>({...d.data(),_id:d.id})));
if(toolsSnap&&toolsSnap.docs.length>0)setTools(toolsSnap.docs.map(d=>({...d.data(),id:d.id})));
}catch(e){console.error("Init error:",e);}
clearTimeout(fallback);setReady(true);
})();
const u1=db.collection("inspections").onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setInspections(d);});

const u3=db.collection("cons").onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setCons(prev=>prev.map(c=>d[c.id]?{...c,...d[c.id]}:c));});
const u4=db.collection("vets").onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setVets(prev=>prev.map(v=>d[v.id]?{...v,...d[v.id]}:v));});
const u5=db.collection("consHist").orderBy("ts","asc").onSnapshot(s=>setHist(s.docs.map(d=>({...d.data(),_id:d.id}))));
const u6=db.collection("tools").onSnapshot(s=>{if(s.docs.length>0)setTools(s.docs.map(d=>({...d.data(),id:d.id})));});
const u7=db.collection("maintenances").onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setMaintenances(d);});
const u8=db.collection("kits").orderBy("ts","asc").onSnapshot(s=>setKits(s.docs.map(d=>({...d.data(),_id:d.id}))));

const pct=st.total?Math.round(st.fait/st.total*100):0;
const lowS=[...cons,...vets].filter(i=>i.stock<=i.min);
const sortiesJ=emprunts.filter(e=>{try{const d=e.dateDepart?.split(" ")[0].split("/").reverse().join("-");return new Date(d).toDateString()===new Date().toDateString();}catch{return false;}}).length;
const entreesJ=emprunts.filter(e=>{if(!e.retour)return false;try{const d=e.retour.split(" ")[0].split("/").reverse().join("-");return new Date(d).toDateString()===new Date().toDateString();}catch{return false;}}).length;
const outilsLongs=emprunts.filter(e=>!e.retour&&daysSince(e.dateDepart)>=1);
const alertCount=outilsLongs.length;

const saveWarehouseConfig=async(wc)=>{setWarehouseConfig(wc);await db.collection("params").doc("config").set({warehouseConfig:wc},{merge:true});showT("Configuration entrepôt sauvegardée!");};
const saveNavConfig=async(nc)=>{setNavConfig(nc);await db.collection("params").doc("config").set({navConfig:nc},{merge:true});showT("Menu configuré!");};
const saveUserAccounts=async(accounts)=>{setUserAccounts(accounts);await db.collection("params").doc("config").set({userAccounts:accounts},{merge:true});showT("Comptes mis à jour!");};
const resolveScannedTarget=raw=>{
const id=n2(raw);
const t=tools.find(x=>n2(x.id)===id);if(t)return{type:"tool",id:t.id,label:t.nom,open:()=>{setModal({t:"insp",tool:t,ins:inspections[t.id]||{},empr:isEmp(t.id)});}};
const c=cons.find(x=>n2(x.id)===id);if(c)return{type:"cons",id:c.id,label:c.nom,open:()=>{setModal({t:"take",item:c,cat:"cons"});}};
const v=vets.find(x=>n2(x.id)===id);if(v)return{type:"vets",id:v.id,label:v.nom,open:()=>{setModal({t:"take",item:v,cat:"vets"});}};
const p=palettes.find(x=>n2(x.id)===id);if(p)return{type:"palette",id:p.id,label:(p.items||[]).map(i=>i.nom).slice(0,2).join(", ")||"Palette",open:()=>{setPage("entrepot");setTimeout(()=>setModal({t:"qr",pal:p}),150);}};
const k=kits.find(x=>x.id&&n2(x.id)===id);if(k)return{type:"kit",id:k.id,label:k.nom,open:()=>{setPage("kits");}};
return null;
};
const scanHandle=raw=>{
const target=resolveScannedTarget(raw);

showT("ID non trouvé: "+raw);
};

setSyncing(true);
for(const tid of data.tids){const t=tools.find(x=>x.id===tid);if(!t||isEmp(t.id))continue;await fbAdd("emprunts",{toolId:t.id,personne:data.pers,etatDepart:data.etat,commentaireDepart:data.comm||"",photoDepart:data.photo||"",dateDepart:now(),retour:null});}
setSyncing(false);setModal(null);showT("Départ(s) enregistré(s)!");
};

const modEmprunt=async(eid,data)=>{setSyncing(true);await fbUpd("emprunts",eid,data);setSyncing(false);setModal(null);showT("Modifié!");};
