// ── PDF PROFESSIONNEL ─────────────────────────────────────────────────────────
const genPDF=(type,data,cfg)=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const name=cfg.nomSite||'LUX AIRPORT';
    const subtitle=cfg.sousTitre||'Gestion Airside';
    const couleur=cfg.couleur||'#c8102e';
    const rgb=hexToRgb(couleur);

    // ── HEADER ──
    doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(0,0,W,32,'F');
    // Logo zone
    doc.setFillColor(255,255,255,30);doc.roundedRect(8,6,20,20,3,3,'F');
    // Logo SVG simplifié en texte
    doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('LUX',18,14,{align:'center'});
    doc.setFontSize(6);doc.text('>',18,18,{align:'center'});
    // Nom
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(name,32,14);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255,180);
    doc.text(subtitle,32,20);
    // Titre rapport
    const titles={insp:'RAPPORT D\'INSPECTION',emp:'RAPPORT D\'EMPRUNTS',stock:'RAPPORT DE STOCK',hist:'HISTORIQUE DES MOUVEMENTS',detail:'DÉTAIL EMPRUNT'};
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(titles[type]||type.toUpperCase(),32,27);
    // Date & ref
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255);
    doc.text('Généré le '+now(),W-10,12,{align:'right'});
    doc.text('Réf : '+refNum('RPT-'+type.toUpperCase()),W-10,18,{align:'right'});

    // ── STATS BAR ──
    let y=38;
    if(data.stats){
      doc.setFillColor(248,248,248);doc.rect(0,32,W,18,'F');
      doc.setDrawColor(230,230,230);doc.line(0,50,W,50);
      const stats=data.stats;const sw=W/stats.length;
      stats.forEach((s,i)=>{
        const x=i*sw;
        const cr=hexToRgb(s.c||'#1c1c1e');
        doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(cr.r,cr.g,cr.b);
        doc.text(String(s.n),x+sw/2,43,{align:'center'});
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);
        doc.text(s.l,x+sw/2,48,{align:'center'});
        if(i<stats.length-1){doc.setDrawColor(230,230,230);doc.line(x+sw,34,x+sw,50);}
      });
      y=56;
    }

    // ── PROGRESS ──
    if(data.progress!==undefined){
      doc.setFillColor(245,245,245);doc.rect(10,y,W-20,12,'F');
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,(W-20)*data.progress/100,12,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(data.progress+'%',W/2,y+8,{align:'center'});
      doc.setTextColor(100,100,100);doc.setFont('helvetica','normal');
      doc.text(data.progressLabel||'',10,y+18);
      y+=22;
    }

    // ── TABLE ──
    if(data.headers&&data.rows){
      y+=4;
      // Header row
      const cw=(W-20)/data.headers.length;
      doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,'F');
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));
      y+=9;
      data.rows.forEach((row,ri)=>{
        if(y>H-20){
          // Footer before page break
          addFooter(doc,W,H,name,1);
          doc.addPage();y=20;
          doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.rect(10,y,W-20,8,'F');
          doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
          data.headers.forEach((hd,i)=>doc.text(hd,12+i*cw,y+5.5));
          y+=9;
        }
        if(ri%2===0){doc.setFillColor(250,250,250);doc.rect(10,y,W-20,8,'F');}
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
        row.forEach((cell,ci)=>{
          const txt=String(cell||'').substring(0,Math.floor(cw/2));
          // Badge couleur
          if(cell==='✅ OK'||cell==='OK'){doc.setTextColor(52,199,89);}
          else if(cell==='⚠️ Moyen'||cell==='Moyen'){doc.setTextColor(255,149,0);}
          else if(cell==='❌ NOK'||cell==='NOK'||cell==='Mauvais'){doc.setTextColor(255,59,48);}
          else if(cell==='📤 Sorti'||cell==='En cours'){doc.setTextColor(0,122,255);}
          else if(cell==='⚠️ Faible'){doc.setTextColor(255,59,48);}
          else{doc.setTextColor(50,50,50);}
          doc.text(txt,12+ci*cw,y+5.5);
        });
        doc.setDrawColor(240,240,240);doc.line(10,y+8,W-10,y+8);
        y+=8;
      });
    }

    // ── DETAIL SECTION ──
    if(data.details){
      y+=4;
      data.details.forEach(([l,v])=>{
        if(y>H-20){addFooter(doc,W,H,name,1);doc.addPage();y=20;}
        doc.setFillColor(248,248,248);doc.rect(10,y,W-20,8,'F');
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);doc.text(l,12,y+5.5);
        doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.text(String(v||'—').substring(0,60),70,y+5.5);
        y+=9;
      });
    }

    // ── SIGNATURE ──
    if(y<H-40){
      y+=10;
      doc.setDrawColor(200,200,200);
      doc.rect(10,y,80,20);doc.rect(100,y,80,20);
      doc.setFontSize(7);doc.setTextColor(150,150,150);
      doc.text('Visa Responsable',12,y+5);doc.text('Date',102,y+5);
      doc.line(12,y+16,88,y+16);doc.line(102,y+16,178,y+16);
      doc.setFontSize(7);doc.text('Nom & Signature',12,y+19);doc.text(new Date().toLocaleDateString('fr-FR'),102,y+19);
    }

    addFooter(doc,W,H,name,1);
    doc.save('LuxAirport_'+type+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(e){alert('Erreur PDF : '+e.message);}
};

function addFooter(doc,W,H,name,page){
  doc.setFillColor(248,248,248);doc.rect(0,H-12,W,12,'F');
  doc.setDrawColor(220,220,220);doc.line(0,H-12,W,H-12);
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
  doc.text(name+' — Gestion Airside · Confidentiel',10,H-5);
  doc.text('Page '+page,W/2,H-5,{align:'center'});
  doc.text(new Date().toLocaleDateString('fr-FR'),W-10,H-5,{align:'right'});
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);const g=parseInt(hex.slice(3,5),16);const b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}

    h('p',{style:{color:S.red,fontWeight:700,fontSize:16}},'Chargement...')
  );
}

function Modal({onClose,children}){
  return h('div',{onClick:e=>{if(e.target===e.currentTarget)onClose();},style:{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:200,display:'flex',alignItems:'flex-end',backdropFilter:'blur(4px)'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:S.white,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,margin:'0 auto',maxHeight:'93vh',overflowY:'auto',padding:'16px 16px 44px'}},
      h('div',{style:{width:36,height:5,background:S.border,borderRadius:3,margin:'0 auto 16px'}}),
      children
    )
  );
}

function SigCanvas({onReady}){
  const ref=useRef(null);const ctx=useRef(null);const on=useRef(false);const last=useRef({x:0,y:0});
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const c=cv.getContext('2d');c.strokeStyle=S.dark;c.lineWidth=2;c.lineCap='round';ctx.current=c;
    if(onReady)onReady(()=>cv.toDataURL());
  },[]);
  const gp=(e,t)=>{const cv=ref.current;const r=cv.getBoundingClientRect();const s=t?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};};
  return h('div',{},
    h('div',{style:{border:'1.5px solid '+S.border,borderRadius:12,overflow:'hidden',marginBottom:8}},
      h('canvas',{ref,width:600,height:100,style:{display:'block',width:'100%',height:100,touchAction:'none',cursor:'crosshair',background:'#fafafa'},
        onMouseDown:e=>{on.current=true;last.current=gp(e,false);},
        onMouseMove:e=>{if(!on.current)return;const p=gp(e,false);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onMouseUp:()=>on.current=false,
        onTouchStart:e=>{e.preventDefault();on.current=true;last.current=gp(e,true);},
        onTouchMove:e=>{e.preventDefault();if(!on.current)return;const p=gp(e,true);ctx.current.beginPath();ctx.current.moveTo(last.current.x,last.current.y);ctx.current.lineTo(p.x,p.y);ctx.current.stroke();last.current=p;},
        onTouchEnd:()=>on.current=false
      })
    ),
    h('button',{onClick:()=>{const cv=ref.current;if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);},
      style:{background:S.bg,border:'none',borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:14}},'Effacer signature')
  );
}

function CamScanner({onDetect}){
  const vr=useRef(null);const cr=useRef(null);const sr=useRef(null);const raf=useRef(null);
  const[manual,setManual]=useState('');const[err,setErr]=useState('');const[ok,setOk]=useState('');
  useEffect(()=>{
    navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment'}})
      .then(s=>{sr.current=s;if(vr.current){vr.current.srcObject=s;vr.current.play();vr.current.onloadedmetadata=tick;}})
      .catch(()=>setErr('Caméra non disponible — utilisez la saisie manuelle'));
    return()=>{cancelAnimationFrame(raf.current);sr.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  const tick=()=>{
    const v=vr.current;const c=cr.current;
    if(!v||!c||v.readyState<2){raf.current=requestAnimationFrame(tick);return;}
    const ctx=c.getContext('2d',{willReadFrequently:true});c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
    const code=jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height,{inversionAttempts:'dontInvert'});
    if(code){setOk(code.data);cancelAnimationFrame(raf.current);sr.current?.getTracks().forEach(t=>t.stop());setTimeout(()=>onDetect(code.data),400);return;}
    raf.current=requestAnimationFrame(tick);
  };
  return h('div',{},
    h('div',{style:{position:'relative',background:'#000',borderRadius:14,overflow:'hidden',marginBottom:12,height:200}},
      h('video',{ref:vr,style:{width:'100%',height:'100%',objectFit:'cover'},playsInline:true,muted:true}),
      h('canvas',{ref:cr,style:{display:'none'}}),
      !ok&&!err&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}},
        h('div',{style:{width:160,height:160,border:'3px solid '+S.red,borderRadius:12,boxShadow:'0 0 0 9999px rgba(0,0,0,.5)'}}),
        h('div',{style:{position:'absolute',bottom:12,color:'#fff',fontSize:11,fontWeight:600}},'Pointez vers le QR code')
      ),
      ok&&h('div',{style:{position:'absolute',inset:0,background:'rgba(52,199,89,.9)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:36}},'✅'),h('div',{style:{color:S.white,fontWeight:800,fontSize:15}},ok)
      ),
      err&&h('div',{style:{position:'absolute',inset:0,background:'#111',display:'flex',alignItems:'center',justifyContent:'center',color:S.white,fontSize:12,padding:16,textAlign:'center'}},err)
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{value:manual,onChange:e=>setManual(e.target.value.toUpperCase()),placeholder:"Ou saisissez l'ID manuellement...",
        style:{flex:1,padding:'11px 13px',border:'1.5px solid '+S.border,borderRadius:12,fontSize:14,outline:'none',textTransform:'uppercase'},
        onKeyDown:e=>e.key==='Enter'&&manual&&onDetect(manual)}),
      h('button',{onClick:()=>manual&&onDetect(manual),style:{background:S.red,color:S.white,border:'none',borderRadius:12,padding:'0 16px',fontWeight:700,cursor:'pointer',fontSize:14}},'OK')
    )
  );
}

function darken(hex){
  try{const r=Math.max(0,parseInt(hex.slice(1,3),16)-30);const g=Math.max(0,parseInt(hex.slice(3,5),16)-20);const b=Math.max(0,parseInt(hex.slice(5,7),16)-20);return`rgb(${r},${g},${b})`;}catch{return hex;}
}

function GlobalSearchModal({tools,cons,vets,emprunts,kits,onClose}){

}

function App(){
  const[ready,setReady]=useState(true);
  const[page,setPage]=useState('accueil');
  const[isAdmin,setIsAdmin]=useState(false);
  const[tools,setTools]=useState(TOOLS_DEFAULT);
  const[inspections,setInspections]=useState({});
  const[emprunts,setEmprunts]=useState([]);
  const[cons,setCons]=useState(CONS_DEFAULT);
  const[vets,setVets]=useState(VET_DEFAULT);
  const[hist,setHist]=useState([]);
  const[employes,setEmployes]=useState(EMP_DEFAULT);
  const[adminPin,setAdminPin]=useState('0000');
  const[cfg,setCfg]=useState({nomSite:'LUX AIRPORT',sousTitre:'Gestion Airside',couleur:'#c8102e',emailResp:'responsable@luxairport.lu',logoUrl:'',coverUrl:'',entete:'Rapport officiel — Gestion des outils et stocks Airside'});
  const[modal,setModal]=useState(null);
  const[currentUser,setCurrentUser]=useState(null);
  const[userAccounts,setUserAccounts]=useState([]);
  const[menuOpen,setMenuOpen]=useState(false);
  const[warehouseConfig,setWarehouseConfig]=useState({allees:2,racks:3,etages:3,positions:['G','M','D']});
  const[navConfig,setNavConfig]=useState([
    {id:'accueil',icon:'🏠',label:'Accueil',visible:true,order:0},
    {id:'emprunts',icon:'📦',label:'Emprunts',visible:true,order:1},
    {id:'inspection',icon:'🔧',label:'Inspection',visible:true,order:2},
    {id:'stocks',icon:'🧤',label:'Stocks',visible:true,order:3},
    {id:'rapport',icon:'📊',label:'Rapport',visible:true,order:6},
    {id:'admin',icon:'🔐',label:'Admin',visible:false,order:7,hidden:true},
  ]);
  const[toast,setToast]=useState('');
  const[syncing,setSyncing]=useState(false);
  const[toolSearch,setToolSearch]=useState('');
  const[toolF,setToolF]=useState('tous');
  const[stockTab,setStockTab]=useState('cons');
  const[stockQ,setStockQ]=useState('');
  const[empF,setEmpF]=useState('tous');

  useEffect(()=>{
    (async()=>{
      try{
        const[empSnap,consSnap,vetsSnap,histSnap,inspSnap,parSnap,toolsSnap]=await Promise.all([
          db.collection('emprunts').orderBy('ts','asc').get(),
          db.collection('cons').get(),
          db.collection('vets').get(),
          db.collection('consHist').orderBy('ts','asc').get(),
          db.collection('inspections').get(),
          db.collection('params').doc('config').get(),
          db.collection('tools').get(),
        ]);
        setEmprunts(empSnap.docs.map(d=>({...d.data(),_id:d.id})));
        const cd={};consSnap.forEach(x=>cd[x.id]=x.data());setCons(CONS_DEFAULT.map(c=>cd[c.id]?{...c,...cd[c.id]}:c));
        const vd={};vetsSnap.forEach(x=>vd[x.id]=x.data());setVets(VET_DEFAULT.map(v=>vd[v.id]?{...v,...vd[v.id]}:v));
        setHist(histSnap.docs.map(d=>({...d.data(),_id:d.id})));
        const id={};inspSnap.forEach(x=>id[x.id]=x.data());setInspections(id);
        // Load tools from Firebase if exist
        if(toolsSnap.docs.length>0){
          const td=toolsSnap.docs.map(d=>({...d.data(),id:d.id}));
          if(td.length>0)setTools(td);
        }
        if(parSnap.exists){
          const p=parSnap.data();
          if(p.employes)setEmployes(p.employes);
          if(p.adminPin)setAdminPin(p.adminPin);
          if(p.cfg)setCfg(prev=>({...prev,...p.cfg}));
        }
      }catch(e){console.error(e);}
      setReady(true);
    })();

    const u1=db.collection('inspections').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setInspections(d);});
    const u2=db.collection('emprunts').orderBy('ts','asc').onSnapshot(s=>setEmprunts(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u3=db.collection('cons').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setCons(prev=>prev.map(c=>d[c.id]?{...c,...d[c.id]}:c));});
    const u4=db.collection('vets').onSnapshot(s=>{const d={};s.forEach(x=>d[x.id]=x.data());setVets(prev=>prev.map(v=>d[v.id]?{...v,...d[v.id]}:v));});
    const u5=db.collection('consHist').orderBy('ts','asc').onSnapshot(s=>setHist(s.docs.map(d=>({...d.data(),_id:d.id}))));
    const u6=db.collection('tools').onSnapshot(s=>{if(s.docs.length>0)setTools(s.docs.map(d=>({...d.data(),id:d.id})));});
    return()=>{u1();u2();u3();u4();u5();u6();};
  },[]);

  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(''),3500);};
  const isEmp=id=>emprunts.find(e=>e.toolId===id&&!e.retour)||null;

  const stats=()=>{
    let ok=0,mo=0,ma=0,at=0,so=0;
    tools.forEach(t=>{
      if(isEmp(t.id)){so++;return;}
      const i=inspections[t.id];
      if(!i||!i.etat){at++;return;}
      if(i.etat==='Bon')ok++;else if(i.etat==='Moyen')mo++;else if(i.etat==='Mauvais')ma++;else at++;
    });
    return{ok,mo,ma,at,so,total:tools.length,fait:ok+mo+ma};
  };
  const st=stats();
  const pct=st.total?Math.round(st.fait/st.total*100):0;
  const lowS=[...cons,...vets].filter(i=>i.stock<=i.min);
  const sortiesJ=emprunts.filter(e=>{try{const d=e.dateDepart?.split(' ')[0].split('/').reverse().join('-');return new Date(d).toDateString()===new Date().toDateString();}catch{return false;}}).length;
  const entreesJ=emprunts.filter(e=>{if(!e.retour)return false;try{const d=e.retour.split(' ')[0].split('/').reverse().join('-');return new Date(d).toDateString()===new Date().toDateString();}catch{return false;}}).length;

  const scanHandle=raw=>{
    const id=n2(raw);
    const t=tools.find(x=>n2(x.id)===id);if(t){setModal(null);setTimeout(()=>setModal({t:'insp',tool:t,ins:inspections[t.id]||{},empr:isEmp(t.id)}),200);return;}
    const c=cons.find(x=>n2(x.id)===id);if(c){setModal(null);setTimeout(()=>setModal({t:'take',item:c,cat:'cons'}),200);return;}
    const v=vets.find(x=>n2(x.id)===id);if(v){setModal(null);setTimeout(()=>setModal({t:'take',item:v,cat:'vets'}),200);return;}
    showT('❌ ID non trouvé : '+raw);
  };

  // ── ACTIONS ──
  const saveInsp=async(id,data)=>{setSyncing(true);await fbSet('inspections',id,{...data,date:now()});setSyncing(false);setModal(null);showT('✅ Inspection enregistrée !');};
  const saveDepart=async data=>{
    setSyncing(true);
    for(const tid of data.tids){const t=tools.find(x=>x.id===tid);if(!t||isEmp(t.id))continue;await fbAdd('emprunts',{toolId:t.id,personne:data.pers,etatDepart:data.etat,commentaireDepart:data.comm||'',photoDepart:data.photo||'',dateDepart:now(),retour:null});}
    setSyncing(false);setModal(null);showT('✅ Départ(s) enregistré(s) !');
  };
  const saveRetour=async(eid,data)=>{setSyncing(true);await fbUpd('emprunts',eid,{...data,retour:now()});setSyncing(false);setModal(null);showT('✅ Retour enregistré !');};
  const modEmprunt=async(eid,data)=>{setSyncing(true);await fbUpd('emprunts',eid,data);setSyncing(false);setModal(null);showT('✅ Modifié !');};
  const delEmprunt=async eid=>{if(!confirm('Supprimer cet emprunt ?'))return;await fbDel('emprunts',eid);showT('🗑️ Supprimé');};
  const openRetour=eid=>{const e=emprunts.find(x=>x._id===eid);if(!e)return;setModal({t:'retCheck',empr:e,tool:tools.find(x=>x.id===e.toolId)});};
  const takeStock=async(item,cat,pers,qte,code,comm)=>{
    setSyncing(true);const ns=Math.max(0,item.stock-qte);
    await fbSet(cat==='cons'?'cons':'vets',item.id,{stock:ns});
    await fbAdd('consHist',{nom:item.nom,id:item.id,qte,action:'sortie',personne:pers,date:now(),categorie:cat,codeArticle:code||'',commentaire:comm||''});
    setSyncing(false);setModal(null);showT('✅ '+qte+'× '+item.nom);
  };
  const addStock=async(item,cat,pers,qte,comm)=>{
    setSyncing(true);const ns=item.stock+qte;
    await fbSet(cat==='cons'?'cons':'vets',item.id,{stock:ns});
    await fbAdd('consHist',{nom:item.nom,id:item.id,qte,action:'entree',personne:pers,date:now(),categorie:cat,commentaire:comm||''});
    setSyncing(false);setModal(null);showT('✅ +'+qte+' '+item.nom);
  };
  const adjStock=async(item,cat,nv,raison)=>{
    setSyncing(true);await fbSet(cat==='cons'?'cons':'vets',item.id,{stock:nv});
    await fbAdd('consHist',{nom:item.nom,id:item.id,qte:Math.abs(nv-item.stock),action:'ajustement',personne:'Admin',date:now(),categorie:cat,commentaire:raison||'Ajustement'});
    setSyncing(false);setModal(null);showT('✅ Stock ajusté !');
  };
  const delHist=async id=>{if(!confirm('Supprimer ?'))return;await fbDel('consHist',id);showT('🗑️ Supprimé');};

  const saveCfg=async newCfg=>{
    setCfg(newCfg);
    await db.collection('params').doc('config').set({cfg:newCfg},{merge:true});
    showT('✅ Paramètres sauvegardés !');
  };
  const saveAdmin=async(np,ne)=>{
    setAdminPin(np);setEmployes(ne);
    await db.collection('params').doc('config').set({adminPin:np,employes:ne},{merge:true});
    showT('✅ Sauvegardé !');
  };

  const importCSV=async(txt,cat)=>{
    const lines=txt.split('\n').filter(l=>l.trim());
    if(lines.length<2){showT('❌ Fichier vide');return;}
    const sep=lines[0].includes(';')?';':',';
    const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase());
    const fi=(k)=>hdrs.findIndex(h=>h.includes(k));
    const iid=fi('numero');const inom=fi('denomination');const iqte=fi('quantit');
    const ifou=fi('fourniss');const iemp=fi('emplac');const iref=fi('reference');
    const itail=fi('taille');const ityp=fi('type');
    setSyncing(true);let cnt=0;
    for(const line of lines.slice(1)){
      const v=line.split(sep).map(x=>x.trim().replace(/"/g,''));
      const id=(v[iid]||'').trim();if(!id)continue;
      const data={nom:v[inom]||'',ref:v[iref]||'',fournisseur:v[ifou]||'',emplacement:v[iemp]||'',stock:parseInt(v[iqte])||0,min:1,lastSync:new Date().toISOString()};
      if(cat==='vets'){data.taille=v[itail]||'';data.type=v[ityp]||'';}
      if(cat==='tools'){data.marque=v[fi('marque')]||'';data.type=v[fi('type')]||'';data.serie=v[fi('serie')]||'';}
      await fbSet(cat==='cons'?'cons':cat==='vets'?'vets':'tools',id,data);cnt++;
    }
    setSyncing(false);setModal(null);showT('✅ '+cnt+' articles importés !');
  };

  // ── RENDER HELPERS ──
  const toolList=tools.filter(t=>{
    const ins=inspections[t.id]||{};const em=isEmp(t.id);
    const q=toolSearch.toLowerCase();
    const ms=!toolSearch||t.nom.toLowerCase().includes(q)||t.id.toLowerCase().includes(q)||(t.marque||'').toLowerCase().includes(q);
    let mf=true;
    if(toolF==='attente')mf=!ins.etat&&!em;else if(toolF==='ok')mf=ins.etat==='Bon';else if(toolF==='moyen')mf=ins.etat==='Moyen';else if(toolF==='mauvais')mf=ins.etat==='Mauvais';else if(toolF==='sorti')mf=!!em;else if(toolF==='HILTI')mf=t.marque==='HILTI';else if(toolF==='MAKITA')mf=t.marque==='MAKITA';
    return ms&&mf;
  });
  const stockList=(stockTab==='cons'?cons:vets).filter(i=>{const q=stockQ.toLowerCase();return !stockQ||i.nom.toLowerCase().includes(q)||i.id.toLowerCase().includes(q)||(i.taille||'').toLowerCase().includes(q);});
  const empList=empF==='tous'?emprunts:empF==='encours'?emprunts.filter(e=>!e.retour):emprunts.filter(e=>e.retour);

  if(!ready)return h(Spinner,null);
  if(!currentUser)return h('div',{style:{minHeight:'100vh',background:'linear-gradient(150deg,'+cfg.couleur+' 0%,#3a0010 50%,#0a0a14 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px'}},
    h('div',{style:{textAlign:'center',marginBottom:28}},
      h('div',{style:{width:72,height:72,borderRadius:18,background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 12px'}},'✈️'),
      h('h1',{style:{color:'#fff',fontWeight:900,fontSize:24,marginBottom:4}},cfg.nomSite||'LUX AIRPORT'),
      h('p',{style:{color:'rgba(255,255,255,.5)',fontSize:12}},'Gestion Airside')
    ),
    h(LoginScreen,{cfg,userAccounts,adminPin,employes,onLogin:(user)=>{
      setCurrentUser(user);
      if(user.role==='admin'){setIsAdmin(true);setPage('admin');}
    }})
  );

  return h('div',{style:{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:S.bg}},
    h(AppHeader,{cfg,lowStock:lowS.length,syncing,isAdmin,onScan:()=>setModal({t:'scan'}),page,setPage}),

    h('div',{style:{padding:'14px 14px 90px'}},

      // ── ACCUEIL ──
      page==='accueil'&&h('div',{className:'fi'},
        // Cover image
        cfg.coverUrl&&h('div',{style:{borderRadius:14,overflow:'hidden',marginBottom:14,height:120}},
          h('img',{src:cfg.coverUrl,style:{width:'100%',height:'100%',objectFit:'cover'}})
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}},
          [{n:st.ok,l:'OK',c:S.green},{n:st.mo,l:'Moyen',c:S.orange},{n:st.ma,l:'NOK',c:S.danger},{n:st.so,l:'Sortis',c:S.blue}].map(x=>
            h('div',{key:x.l,style:{background:S.white,borderRadius:14,padding:'12px 6px',textAlign:'center',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}},
              h('div',{style:{fontSize:26,fontWeight:800,color:x.c,lineHeight:1}},x.n),
              h('div',{style:{fontSize:10,color:S.gray,fontWeight:600,textTransform:'uppercase',letterSpacing:.5,marginTop:3}},x.l)
            )
          )
        ),
        h('div',{style:{background:S.white,borderRadius:14,padding:'14px 16px',marginBottom:12,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}},
